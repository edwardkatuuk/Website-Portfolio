<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />

  <meta
    name="description"
    content="Edward Katuuk - Personal Website"
  />

  <title>Edward Katuuk</title>

  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  
  <style>
    :root {
      --background: #000;
      --foreground: #f5f5f5;
      --muted: #858585;
      --panel: #181818;
      --border: rgba(255, 255, 255, 0.13);
      --page-x: clamp(28px, 7.1vw, 138px);
      --page-y: clamp(28px, 8.5vh, 92px);
      --gallery-gap: 5px;
      --font-main: "Helvetica Neue", Helvetica, Arial, sans-serif;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    * {
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      color: var(--foreground);
      background: var(--background);
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    html::-webkit-scrollbar,
    body::-webkit-scrollbar {
      display: none;
    }

    body {
      overflow: hidden;
      font-family: var(--font-main);
      font-weight: 400;
      letter-spacing: -0.055em;
      cursor: none;
    }

    button,
    a {
      color: inherit;
      font: inherit;
      cursor: none;
    }

    button {
      appearance: none;
      border: 0;
      background: none;
    }

    a {
      text-decoration: none;
    }

    img,
    video,
    iframe {
      display: block;
      max-width: 100%;
    }

    iframe {
      border: 0;
    }

    ::selection {
      color: #000;
      background: #fff;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      background: #000;
    }

    .page {
      position: absolute;
      inset: 0;
      visibility: hidden;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      transform: translateY(18px);
      transition:
        opacity 650ms var(--ease),
        transform 650ms var(--ease),
        visibility 650ms;
    }

    .page.is-active {
      visibility: visible;
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .fade-item {
      opacity: 0;
      transform: translateY(22px);
      transition:
        opacity 750ms var(--ease),
        transform 750ms var(--ease);
    }

    .page.is-active .fade-item {
      opacity: 1;
      transform: translateY(0);
    }

    .cursor {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 9999;
      width: 18px;
      height: 18px;
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      transform: translate3d(-50%, -50%, 0);
      transition:
        width 220ms var(--ease),
        height 220ms var(--ease),
        background-color 220ms var(--ease),
        border-color 220ms var(--ease),
        opacity 200ms ease;
      mix-blend-mode: difference;
    }

    .cursor.is-visible {
      opacity: 1;
    }

    .cursor.is-hovering {
      width: 46px;
      height: 46px;
      border-color: #fff;
      background: #fff;
    }

    .cursor.is-viewing {
      width: 76px;
      height: 76px;
    }

    .cursor::after {
      content: attr(data-label);
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #000;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0;
      opacity: 0;
    }

    .cursor.is-viewing::after {
      opacity: 1;
    }

    /* =========================================================
       HOME
    ========================================================== */

    .home-page {
      display: grid;
      place-items: center;
      padding: var(--page-y) var(--page-x);
    }

    .home-composition {
      width: min(100%, 1040px);

      display: grid;

      grid-template-columns:
        minmax(220px, 315px)
        minmax(360px, 490px)
        minmax(145px, 215px);

      grid-template-rows:
        minmax(0, 1fr)
        54px;

      grid-template-areas:
        "work portrait intro"
        "contact portrait intro";

      align-items: stretch;

      gap:
        clamp(12px, 1vw, 20px)
        clamp(14px, 1.2vw, 24px);

      margin-left: clamp(0px, 7vw, 140px);
    }

    .work-button {
      grid-area: work;
      position: relative;

      width: 100%;
      min-width: 0;
      max-width: 100%;
      height: 100%;
      min-height: 0;

      overflow: hidden;

      color: #fff;
      background: var(--panel);

      container-type: inline-size;
      isolation: isolate;

      transition:
        color 300ms,
        background-color 300ms;
    }

    .work-button:hover,
    .work-button:focus-visible {
      color: #000;
      background: #f2f2f2;
      outline: none;
    }

    .work-button-inner {
      position: absolute;
      inset: 0;

      display: flex;
      align-items: center;

      overflow: hidden;

      padding:
        clamp(24px, 16cqw, 52px)
        clamp(20px, 15cqw, 48px);
    }

    .work-button-label {
      display: flex;
      flex-direction: column;
      align-items: flex-start;

      max-width: 100%;
      overflow: hidden;

      font-size: clamp(38px, 21cqw, 68px);
      line-height: 0.9;
      letter-spacing: -0.08em;
    }

    .work-button-line {
      display: block;
      white-space: nowrap;
    }

    .contact-button {
      grid-area: contact;

      width: 100%;
      min-height: 54px;

      display: flex;
      align-items: center;
      justify-content: space-between;

      padding: 0 18px;

      color: var(--muted);
      background: #111;

      font-size: 14px;
      letter-spacing: -0.025em;

      transition:
        color 250ms,
        background-color 250ms;
    }

    .contact-button::after {
      content: "↗";
      font-size: 17px;
    }

    .contact-button:hover,
    .contact-button:focus-visible {
      color: #000;
      background: #f2f2f2;
      outline: none;
    }

    .portrait-frame {
      grid-area: portrait;
      position: relative;

      min-width: 0;
      width: 100%;
      aspect-ratio: 1;

      overflow: hidden;

      padding: 10px;
      background: #171717;
    }

    .portrait-frame img {
      width: 100%;
      height: 100%;

      object-fit: cover;
      filter: grayscale(1);

      transition:
        filter 500ms,
        transform 900ms var(--ease);
    }

    .portrait-frame:hover img {
      filter: grayscale(0);
      transform: scale(1.025);
    }

    .intro-copy {
      grid-area: intro;
      align-self: stretch;

      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .intro-name {
      font-size: clamp(20px, 1.35vw, 28px);
      line-height: 1.2;
      letter-spacing: -0.06em;
    }

    .intro-words {
      flex: 1;

      display: flex;
      flex-direction: column;
      justify-content: space-between;

      padding-top: clamp(62px, 8vh, 130px);

      color: var(--muted);

      font-size: clamp(16px, 1.15vw, 23px);
      line-height: 1;
    }

    .intro-words span {
      white-space: nowrap;
    }

    /* =========================================================
       PROJECT INDEX
    ========================================================== */

    .project-index-page {
      display: grid;
      place-items: center;
      padding: var(--page-y) var(--page-x);
    }

    .project-index-wrap {
      width: min(100%, 1000px);

      display: flex;
      flex-direction: column;
      align-items: center;

      gap: clamp(15px, 2.5vh, 28px);
    }

    .project-link {
      color: #f5f5f5;

      font-size: clamp(35px, 3.05vw, 60px);
      line-height: 1;
      letter-spacing: -0.075em;
      text-align: center;

      transition:
        color 220ms,
        transform 250ms var(--ease);
    }

    .project-link:hover {
      color: var(--muted);
      transform: translateY(-2px);
    }

    .back-button {
      position: fixed;
      top: 34px;
      left: var(--page-x);
      z-index: 80;

      color: var(--muted);

      font-size: 14px;
      letter-spacing: -0.02em;
    }

    .back-button:hover {
      color: #fff;
    }

    /* =========================================================
       DETAIL
    ========================================================== */

    .project-detail-page {
      padding: 0 var(--page-x);
    }

    .detail-layout {
      width: 100%;
      height: 100%;

      display: grid;

      grid-template-columns:
        minmax(350px, 31vw)
        minmax(0, 1fr);

      gap: clamp(40px, 6.3vw, 122px);
    }

    .category-panel {
      position: relative;
      z-index: 3;

      height: 100%;

      overflow-y: auto;

      padding-top: clamp(112px, 11.8vh, 128px);
      padding-bottom: 50px;

      background: #000;

      scrollbar-width: none;
    }

    .category-panel::-webkit-scrollbar {
      display: none;
    }

    .category-list {
      display: flex;
      flex-direction: column;
      align-items: flex-start;

      gap: clamp(26px, 4vh, 48px);
    }

    .category-button {
      max-width: 100%;

      color: var(--muted);

      font-size: clamp(30px, 2.55vw, 50px);
      line-height: 1;
      letter-spacing: -0.07em;
      text-align: left;

      transition:
        color 250ms,
        transform 250ms var(--ease);
    }

    .category-button:hover {
      color: #d9d9d9;
      transform: translateX(8px);
    }

    .category-button.is-active {
      color: #fff;
    }

    .category-info {
      display: none;

      margin-top: clamp(45px, 7vh, 78px);
      padding-bottom: 50px;

      animation: info-in 500ms var(--ease) both;
    }

    .category-info.is-visible {
      display: block;
    }

    .category-info-label {
      margin-bottom: 20px;

      color: var(--muted);

      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .category-info-title {
      margin-bottom: 35px;

      font-size: clamp(25px, 2.1vw, 38px);
      font-weight: 400;
      line-height: 1;
      letter-spacing: -0.065em;
    }

    .category-info-meta {
      display: grid;
      gap: 16px;

      margin-bottom: 34px;
    }

    .category-info-row {
      display: grid;
      grid-template-columns: 78px 1fr;

      gap: 12px;

      padding-top: 12px;

      border-top: 1px solid var(--border);

      font-size: 13px;
      line-height: 1.4;
      letter-spacing: -0.02em;
    }

    .category-info-key {
      color: var(--muted);
    }

    .category-info-value {
      color: #fff;
    }

    .category-info-description {
      color: #aaa;

      font-size: clamp(15px, 1vw, 18px);
      line-height: 1.5;
      letter-spacing: -0.03em;

      white-space: pre-line;
    }

    @keyframes info-in {
      from {
        opacity: 0;
        transform: translateY(15px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    /* =========================================================
       GALLERY — CSS COLUMNS MASONY FIX (v2 Style)
    ========================================================== */

    .gallery-scroll {
      width: 100%;

      height: 100vh;
      height: 100dvh;

      overflow-x: hidden;
      overflow-y: auto;

      padding:
        clamp(112px, 11.8vh, 128px)
        0
        0;

      scrollbar-width: none;
    }

    .gallery-scroll::-webkit-scrollbar {
      display: none;
    }

    .gallery-grid {
      column-count: 3;
      column-gap: var(--gallery-gap);
      width: 100%;
      font-size: 0;
      line-height: 0;
    }

    .gallery-card {
      position: relative;
      display: block;
      width: 100%;
      min-width: 0;
      margin: 0 0 var(--gallery-gap) 0;
      break-inside: avoid;

      overflow: hidden;

      background: #999;

      animation: card-in 600ms var(--ease) both;
    }

    .gallery-card[data-ratio="portrait"] {
      aspect-ratio: 9 / 16;
    }

    .gallery-card[data-ratio="portrait-wide"] {
      aspect-ratio: 3 / 4;
    }

    .gallery-card[data-ratio="square"] {
      aspect-ratio: 1;
    }

    .gallery-card[data-ratio="landscape"] {
      aspect-ratio: 16 / 9;
    }

    .gallery-card[data-ratio="landscape-four-three"] {
      aspect-ratio: 4 / 3;
    }

    .gallery-card[data-ratio="wide"] {
      aspect-ratio: 21 / 9;
    }

    .gallery-card img,
    .gallery-card video {
      width: 100%;
      height: 100%;
      max-width: none;

      object-fit: cover;

      transition:
        transform 750ms var(--ease),
        filter 350ms;
    }

    .gallery-card:hover img,
    .gallery-card:hover video {
      filter: brightness(0.76);
      transform: scale(1.035);
    }

    .gallery-card-info {
      position: absolute;
      right: 0;
      bottom: 0;
      left: 0;
      z-index: 2;

      display: flex;
      align-items: flex-end;
      justify-content: space-between;

      gap: 20px;

      padding: 18px;

      background:
        linear-gradient(
          to top,
          rgba(0, 0, 0, 0.86),
          transparent
        );

      opacity: 0;
      transform: translateY(10px);

      transition:
        opacity 300ms,
        transform 350ms var(--ease);
    }

    .gallery-card:hover .gallery-card-info,
    .gallery-card:focus-visible .gallery-card-info {
      opacity: 1;
      transform: none;
    }

    .gallery-card-title {
      font-size: clamp(16px, 1.15vw, 22px);
      line-height: 1.05;
      letter-spacing: -0.045em;
    }

    .gallery-card-type {
      color: rgba(255, 255, 255, 0.7);

      font-size: 11px;
      line-height: 1;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .play-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      z-index: 3;

      width: 0;
      height: 0;

      border-top: 18px solid transparent;
      border-bottom: 18px solid transparent;
      border-left: 29px solid rgba(40, 40, 40, 0.75);

      transform: translate(-42%, -50%);

      pointer-events: none;
    }

    .gallery-empty {
      min-height: 60vh;
      grid-column: 1 / -1;

      display: grid;
      place-items: center;

      color: var(--muted);

      font-size: clamp(24px, 3vw, 48px);
      line-height: 1.15;
      text-align: center;
    }

    @keyframes card-in {
      from {
        opacity: 0;
        transform: translateY(25px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    /* =========================================================
       VIEWER
    ========================================================== */

    .viewer {
      position: fixed;
      inset: 0;
      z-index: 500;

      visibility: hidden;

      display: grid;
      grid-template-rows: auto minmax(0, 1fr);

      padding:
        max(22px, env(safe-area-inset-top))
        max(24px, env(safe-area-inset-right))
        max(22px, env(safe-area-inset-bottom))
        max(24px, env(safe-area-inset-left));

      background: rgba(0, 0, 0, 0.96);
      backdrop-filter: blur(16px);

      opacity: 0;

      transition:
        opacity 350ms,
        visibility 350ms;
    }

    .viewer.is-open {
      visibility: visible;
      opacity: 1;
    }

    .viewer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;

      gap: 20px;

      padding-bottom: 18px;

      font-size: 14px;
      letter-spacing: -0.02em;
    }

    .viewer-close {
      color: var(--muted);
    }

    .viewer-close:hover {
      color: #fff;
    }

    .viewer-body {
      min-height: 0;

      display: grid;

      grid-template-columns:
        minmax(0, 1fr)
        minmax(220px, 300px);

      gap: clamp(26px, 4vw, 74px);

      overflow: hidden;
    }

    .viewer-media-area {
      min-width: 0;
      min-height: 0;

      display: grid;
      place-items: center;

      overflow: hidden;
    }

    .viewer-media-shell {
      position: relative;

      width: min(100%, 1400px);
      height: min(100%, 86vh);

      display: grid;
      place-items: center;

      overflow: hidden;

      background: #0a0a0a;
    }

    .viewer-media-shell[data-ratio="portrait"] {
      width: min(100%, calc(82vh * 9 / 16));
      aspect-ratio: 9 / 16;
      height: auto;
    }

    .viewer-media-shell[data-ratio="portrait-wide"] {
      width: min(100%, calc(82vh * 3 / 4));
      aspect-ratio: 3 / 4;
      height: auto;
    }

    .viewer-media-shell[data-ratio="square"] {
      width: min(100%, 82vh);
      aspect-ratio: 1;
      height: auto;
    }

    .viewer-media-shell[data-ratio="landscape"] {
      aspect-ratio: 16 / 9;
      height: auto;
    }

    .viewer-media-shell[data-ratio="landscape-four-three"] {
      width: min(100%, calc(82vh * 4 / 3));
      aspect-ratio: 4 / 3;
      height: auto;
    }

    .viewer-media-shell[data-ratio="wide"] {
      aspect-ratio: 21 / 9;
      height: auto;
    }

    .viewer-media-shell img,
    .viewer-media-shell video,
    .viewer-media-shell iframe {
      width: 100%;
      height: 100%;

      object-fit: contain;

      background: #0a0a0a;
    }

    .viewer-caption {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;

      padding-bottom: 40px;
    }

    .viewer-item-type {
      margin-bottom: 15px;

      color: var(--muted);

      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .viewer-item-title {
      font-size: clamp(35px, 3.3vw, 62px);
      font-weight: 400;
      line-height: 0.92;
      letter-spacing: -0.075em;
    }

    .viewer-error {
      padding: 45px;

      color: #b7b7b7;
      background: #111;

      font-size: 22px;
      line-height: 1.3;
      text-align: center;
    }

    /* =========================================================
       CONTACT
    ========================================================== */

    .contact-modal {
      position: fixed;
      inset: 0;
      z-index: 600;

      visibility: hidden;

      display: grid;
      place-items: center;

      padding: 22px;

      background: rgba(0, 0, 0, 0.88);
      backdrop-filter: blur(16px);

      opacity: 0;

      transition:
        opacity 350ms,
        visibility 350ms;
    }

    .contact-modal.is-open {
      visibility: visible;
      opacity: 1;
    }

    .contact-card {
      position: relative;

      width: min(100%, 650px);

      padding: clamp(30px, 5vw, 70px);

      background: #141414;
    }

    .contact-close {
      position: absolute;
      top: 20px;
      right: 22px;

      color: var(--muted);

      font-size: 14px;
    }

    .contact-eyebrow {
      margin-bottom: clamp(55px, 10vh, 110px);

      color: var(--muted);

      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .contact-heading {
      margin-bottom: clamp(45px, 8vh, 85px);

      font-size: clamp(40px, 5vw, 74px);
      font-weight: 400;
      line-height: 0.92;
      letter-spacing: -0.075em;
    }

    .contact-links {
      display: grid;
    }

    .contact-link {
      display: flex;
      justify-content: space-between;

      gap: 20px;

      padding: 17px 0;

      border-top: 1px solid var(--border);

      font-size: clamp(16px, 1.5vw, 22px);
    }

    .contact-link:last-child {
      border-bottom: 1px solid var(--border);
    }

    .contact-link::after {
      content: "↗";
      color: var(--muted);
    }

    .mobile-category-toggle {
      display: none;
    }

    /* =========================================================
       RESPONSIVE
    ========================================================== */

    @media (max-width: 1180px) {
      .home-composition {
        grid-template-columns:
          minmax(205px, 285px)
          minmax(340px, 450px)
          minmax(130px, 175px);

        margin-left: 0;
      }

      .detail-layout {
        grid-template-columns:
          minmax(290px, 34vw)
          minmax(0, 1fr);

        gap: 45px;
      }

      .gallery-grid {
        column-count: 3;
      }
    }

    @media (max-width: 820px) {
      :root {
        --page-x: 22px;
        --page-y: 22px;
        --gallery-gap: 4px;
      }

      body,
      button,
      a {
        cursor: auto;
      }

      .cursor {
        display: none;
      }

      .home-page,
      .project-index-page {
        overflow-y: auto;
      }

      .home-composition {
        width: min(100%, 520px);

        grid-template-columns: 1fr;
        grid-template-rows: auto;

        grid-template-areas:
          "portrait"
          "work"
          "contact"
          "intro";

        align-items: stretch;

        margin-left: 0;
        padding: 55px 0;
      }

      .work-button {
        height: auto;
        aspect-ratio: 1.45 / 1;
      }

      .intro-copy {
        min-height: 240px;
      }

      .project-index-wrap {
        align-items: flex-start;
        padding: 100px 0;
      }

      .project-link {
        text-align: left;
      }

      .project-detail-page {
        padding: 0;
      }

      .detail-layout {
        display: block;
      }

      .category-panel {
        position: fixed;
        top: 0;
        right: 0;
        left: 0;
        z-index: 60;

        height: auto;
        overflow: visible;

        padding: 20px 22px;

        border-bottom: 1px solid var(--border);

        background: #000;
      }

      .mobile-category-toggle {
        width: 100%;

        display: flex;
        justify-content: space-between;

        color: #fff;

        font-size: 17px;
      }

      .mobile-category-toggle::after {
        content: "+";

        color: var(--muted);

        font-size: 25px;
      }

      .category-panel.is-open
      .mobile-category-toggle::after {
        content: "−";
      }

      .category-list {
        position: absolute;
        top: 100%;
        right: 0;
        left: 0;

        display: none;

        gap: 0;

        max-height: calc(100dvh - 65px);

        overflow-y: auto;

        padding: 8px 22px 25px;

        border-bottom: 1px solid var(--border);

        background: #000;
      }

      .category-panel.is-open
      .category-list {
        display: flex;
      }

      .category-button {
        width: 100%;

        padding: 13px 0;

        font-size: 27px;
      }

      .category-info {
        position: static;

        margin-top: 0;
        padding: 30px 22px 45px;

        border-bottom: 1px solid var(--border);
      }

      .gallery-scroll {
        height: 100vh;
        height: 100dvh;

        padding: 65px 0 0;
      }

      .gallery-grid {
        column-count: 2;
      }

      .gallery-card-info {
        opacity: 1;
        transform: none;
      }

      .back-button {
        top: auto;

        bottom:
          max(
            18px,
            env(safe-area-inset-bottom)
          );

        left: 22px;

        padding: 10px 14px;

        border-radius: 999px;

        background: #191919;
      }

      .viewer {
        padding:
          max(16px, env(safe-area-inset-top))
          14px
          max(16px, env(safe-area-inset-bottom));
      }

      .viewer-body {
        grid-template-columns: 1fr;

        grid-template-rows:
          minmax(0, 1fr)
          auto;

        overflow-y: auto;
      }

      .viewer-caption {
        padding: 15px 0 35px;
      }

      .contact-card {
        padding: 55px 25px 30px;
      }
    }

    @media (max-width: 520px) {
      .gallery-grid {
        column-count: 1;
      }

      .viewer-item-title {
        font-size: 39px;
      }

      .contact-heading {
        font-size: 42px;
      }
    }

    @media (hover: none), (pointer: coarse) {
      body,
      button,
      a {
        cursor: auto;
      }

      .cursor {
        display: none;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        transition-duration: 1ms !important;
      }
    }
  </style>

    function showPage(
      pageName,
      updateHash = true
    ) {
      if (!pages[pageName]) {
        pageName = "home";
      }

      Object.entries(pages).forEach(
        ([name, page]) => {
          const active = name === pageName;

          page.classList.toggle(
            "is-active",
            active
          );

          page.setAttribute(
            "aria-hidden",
            String(!active)
          );
        }
      );

      categoryPanel.classList.remove(
        "is-open"
      );

      mobileCategoryToggle.setAttribute(
        "aria-expanded",
        "false"
      );

      if (updateHash) {
        const hashes = {
          home: "#home",
          projects: "#projects",

          detail: currentProject
            ? `#project/${currentProject.id}`
            : "#projects"
        };

        history.replaceState(
          null,
          "",
          hashes[pageName]
        );
      }
    }

    openWorkButton.addEventListener(
      "click",
      () => showPage("projects")
    );

    document
      .querySelectorAll("[data-action]")
      .forEach((button) => {
        button.addEventListener(
          "click",
          () => {
            const destination =
              button.dataset.action;

            if (
              destination === "projects"
            ) {
              currentProject = null;
              currentCategory = null;
            }

            showPage(destination);

        );

    function renderProjectIndex() {
      projectIndex.replaceChildren();

      PORTFOLIO_DATA.forEach(
        (project, index) => {
          const button =
            document.createElement("button");

          button.type = "button";

          button.className =
            "project-link interactive fade-item";

          button.textContent =
            project.name;

          button.style.transitionDelay =
            `${index * 35}ms`;

          button.addEventListener(
            "click",
            () => openProject(project.id)
          );

          projectIndex.appendChild(button);
        }
      );

      registerCursorTargets();
    }

    function openProject(projectId) {
      const project =
        PORTFOLIO_DATA.find(
          (item) => item.id === projectId
        );

      if (!project) {
        showPage("projects");
        return;
      }

      currentProject = project;

      renderCategories(project);

      if (project.categories.length) {
        selectCategory(
          project.categories[0].id
        );
      } else {
        galleryGrid.innerHTML = `
          <div class="gallery-empty">
            Belum ada kategori.
          </div>
        `;

        categoryInfo.classList.remove(
          "is-visible"
        );
      }

      showPage("detail");
    }

    function renderCategories(project) {
      categoryList.replaceChildren();

      project.categories.forEach(
        (category) => {
          const button =
            document.createElement("button");

          button.type = "button";

          button.className =
            "category-button interactive";

          button.dataset.categoryId =
            category.id;

          button.textContent =
            category.name;

          button.addEventListener(
            "click",
            () => {
              selectCategory(category.id);

              categoryPanel.classList.remove(
                "is-open"
              );

              mobileCategoryToggle.setAttribute(
                "aria-expanded",
                "false"
              );
            }
          );

          categoryList.appendChild(button);
        }
      );

      registerCursorTargets();
    }

    function selectCategory(categoryId) {
      if (!currentProject) {
        return;
      }

      const category =
        currentProject.categories.find(
          (item) =>
            item.id === categoryId
        );

      if (!category) {
        return;
      }

      currentCategory = category;

      mobileCategoryLabel.textContent =
        category.name;

      document
        .querySelectorAll(
          ".category-button"
        )
        .forEach((button) => {
          const active =
            button.dataset.categoryId ===
            categoryId;

          button.classList.toggle(
            "is-active",
            active
          );

          button.setAttribute(
            "aria-current",
            active ? "true" : "false"
          );
        });

      renderCategoryInfo(category);

      galleryScroll.scrollTop = 0;

      renderGallery(category.items);
    }

    function renderCategoryInfo(category) {
      categoryInfo.classList.remove(
        "is-visible"
      );

      categoryInfoTitle.textContent =
        category.name ||
        "Untitled Project";

      categoryInfoRole.textContent =
        category.role || "—";

      categoryInfoSoftware.textContent =
        category.software || "—";

      categoryInfoYear.textContent =
        category.year || "—";

      categoryInfoDescription.textContent =
        category.description ||
        "Deskripsi belum ditambahkan.";

      placeCategoryInfo();

      requestAnimationFrame(() => {
        categoryInfo.classList.add(
          "is-visible"
        );
      });
    }

    function placeCategoryInfo() {
      const mobile =
        window.matchMedia(
          "(max-width: 820px)"
        ).matches;

      if (mobile) {
        mobileCategoryInfoMount.appendChild(
          categoryInfo
        );
      } else {
        categoryPanel.appendChild(
          categoryInfo
        );
      }
    }

    window.addEventListener(
      "resize",
      placeCategoryInfo
    );

    function renderGallery(items) {
      galleryGrid.replaceChildren();

      if (!items || !items.length) {
        galleryGrid.innerHTML = `
          <div class="gallery-empty">
            Belum ada karya.
          </div>
        `;

        return;
      }

      items.forEach((item, index) => {
        const card =
          document.createElement("article");

        card.className =
          "gallery-card interactive media-trigger";

        card.dataset.ratio =
          item.ratio || "square";

        card.style.animationDelay =
          `${Math.min(
            index * 45,
            360
          )}ms`;

        card.tabIndex = 0;

        card.setAttribute(
          "role",
          "button"
        );

        card.setAttribute(
          "aria-label",
          `Open ${item.title}`
        );

        const media =
          item.type === "youtube" ||
          item.type === "video"
            ? createVideoThumbnail(item)
            : createImage(item);

        card.appendChild(media);

        if (
          item.type === "youtube" ||
          item.type === "video"
        ) {
          const playIcon =
            document.createElement("span");

          playIcon.className = "play-icon";

          playIcon.setAttribute(
            "aria-hidden",
            "true"
          );

          card.appendChild(playIcon);
        }

        const info =
          document.createElement("div");

        info.className =
          "gallery-card-info";

        const title =
          document.createElement("span");

        title.className =
          "gallery-card-title";

        title.textContent = item.title;

        const type =
          document.createElement("span");

        type.className =
          "gallery-card-type";

        type.textContent =
          item.type === "youtube"
            ? "video"
            : item.type;

        info.append(title, type);
        card.appendChild(info);

        card.addEventListener(
          "click",
          () => openViewer(item)
        );

        card.addEventListener(
          "keydown",
          (event) => {
            if (
              event.key === "Enter" ||
              event.key === " "
            ) {
              event.preventDefault();
              openViewer(item);
            }
          }
        );

        galleryGrid.appendChild(card);
      });

      registerCursorTargets();
    }

    function createImage(item) {
      const image =
        document.createElement("img");

      image.src = item.src;
      image.alt = item.title;
      image.loading = "lazy";
      image.decoding = "async";

      image.addEventListener(
        "error",
        () => {
          image.onerror = null;

          image.src =
            "https://images.unsplash.com/photo-1558655146-d09347e92766?auto=format&fit=crop&w=1200&q=80";
        }
      );

      return image;
    }

    function createVideoThumbnail(item) {
      const image =
        document.createElement("img");

      let poster = item.poster || "";

      if (
        !poster &&
        item.type === "youtube"
      ) {
        const videoId =
          extractYouTubeId(item.src);

        if (videoId) {
          poster =
            `https://i.ytimg.com/vi/${videoId}/maxresdefault.jpg`;
        }
      }

      image.src =
        poster ||
        "https://www.image2url.com/r2/default/images/1783993247149-9cacd6ad-c2cc-4316-8d51-f9159215b9c7.jpg";

      image.alt =
        `${item.title} video thumbnail`;

      image.loading = "lazy";

      image.addEventListener(
        "error",
        () => {
          const videoId =
            extractYouTubeId(item.src);

          if (
            videoId &&
            !image.dataset.usedFallback
          ) {
            image.dataset.usedFallback =
              "true";

            image.src =
              `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`;

            return;
          }

          image.onerror = null;

          image.src =
            "https://images.unsplash.com/photo-1492619375914-88005aa9e8fb?auto=format&fit=crop&w=1200&q=80";
        }
      );

      return image;
    }

    function extractYouTubeId(input) {
      if (!input) {
        return null;
      }

      const raw =
        String(input).trim();

      if (
        /^[a-zA-Z0-9_-]{11}$/.test(raw)
      ) {
        return raw;
      }

      try {
        const url =
          new URL(
            raw,
            window.location.origin
          );

        const hostname =
          url.hostname
            .replace(/^www\./, "")
            .replace(/^m\./, "");

        if (hostname === "youtu.be") {
          return (
            url.pathname
              .split("/")
              .filter(Boolean)[0] ||
            null
          );
        }

        if (
          hostname === "youtube.com" ||
          hostname ===
            "youtube-nocookie.com"
        ) {
          if (url.pathname === "/watch") {
            return (
              url.searchParams.get("v") ||
              null
            );
          }

          const parts =
            url.pathname
              .split("/")
              .filter(Boolean);

          if (
            [
              "embed",
              "shorts",
              "live"
            ].includes(parts[0])
          ) {
            return parts[1] || null;
          }
        }
      } catch {}

      const match = raw.match(
        /(?:youtu\.be\/|youtube\.com\/(?:watch\?.*v=|embed\/|shorts\/|live\/))([a-zA-Z0-9_-]{11})/
      );

      return match ? match[1] : null;
    }

    function createYouTubeEmbedURL(input) {
      const videoId =
        extractYouTubeId(input);

      if (!videoId) {
        return null;
      }

      const params =
        new URLSearchParams({
          autoplay: "1",
          rel: "0",
          modestbranding: "1",
          playsinline: "1"
        });

      return (
        "https://www.youtube-nocookie.com/embed/" +
        encodeURIComponent(videoId) +
        "?" +
        params.toString()
      );
    }

    function openViewer(item) {
      previouslyFocusedElement =
        document.activeElement;

      viewerHeaderLabel.textContent =
        currentProject
          ? currentProject.name
          : "Project preview";

      viewerTitle.textContent =
        item.title || "Untitled";

      viewerItemType.textContent = [
        currentCategory?.name,

        item.type === "youtube"
          ? "Video"
          : "Image"
      ]
        .filter(Boolean)
        .join(" / ");

      viewerMediaArea.replaceChildren();

      const shell =
        document.createElement("div");

      shell.className =
        "viewer-media-shell";

      shell.dataset.ratio =
        item.ratio || "landscape";

      if (item.type === "youtube") {
        const embedURL =
          createYouTubeEmbedURL(
            item.src
          );

        if (!embedURL) {
          renderViewerError(
            shell,
            "URL YouTube belum valid. Ganti VIDEO_ID dengan ID atau URL YouTube."
          );
        } else {
          const iframe =
            document.createElement(
              "iframe"
            );

          iframe.src = embedURL;
          iframe.title = item.title;

          iframe.allow =
            "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";

          iframe.allowFullscreen = true;

          iframe.referrerPolicy =
            "strict-origin-when-cross-origin";

          shell.appendChild(iframe);
        }
      } else if (
        item.type === "video"
      ) {
        const video =
          document.createElement("video");

        video.src = item.src;
        video.poster =
          item.poster || "";

        video.controls = true;
        video.autoplay = true;
        video.playsInline = true;

        video.addEventListener(
          "error",
          () => {
            shell.replaceChildren();

            renderViewerError(
              shell,
              "Video tidak dapat dimuat."
            );
          }
        );

        shell.appendChild(video);
      } else {
        const image =
          document.createElement("img");

        image.src = item.src;
        image.alt = item.title;

        image.addEventListener(
          "error",
          () => {
            shell.replaceChildren();

            renderViewerError(
              shell,
              "Gambar tidak dapat dimuat."
            );
          }
        );

        shell.appendChild(image);
      }

      viewerMediaArea.appendChild(shell);

      viewer.classList.add("is-open");

      viewer.setAttribute(
        "aria-hidden",
        "false"
      );

      viewerClose.focus();
    }

    function renderViewerError(
      container,
      message
    ) {
      const error =
        document.createElement("div");

      error.className = "viewer-error";
      error.textContent = message;

      container.appendChild(error);
    }

    function closeViewer() {
      const video =
        viewerMediaArea.querySelector(
          "video"
        );

      if (video) {
        video.pause();
        video.removeAttribute("src");
        video.load();
      }

      viewerMediaArea.replaceChildren();

      viewer.classList.remove("is-open");

      viewer.setAttribute(
        "aria-hidden",
        "true"
      );

      restorePreviousFocus();
    }

    viewerClose.addEventListener(
      "click",
      closeViewer
    );

    viewer.addEventListener(
      "click",
      (event) => {
        if (event.target === viewer) {
          closeViewer();
        }
      }
    );

    function initializeContact() {
      emailLink.textContent =
        CONTACT_DATA.email;

      emailLink.href =
        `mailto:${CONTACT_DATA.email}`;

      instagramLink.textContent =
        CONTACT_DATA.instagramUsername;

      instagramLink.href =
        CONTACT_DATA.instagramURL;
    }

    function openContact() {
      previouslyFocusedElement =
        document.activeElement;

      contactModal.classList.add(
        "is-open"
      );

      contactModal.setAttribute(
        "aria-hidden",
        "false"
      );

      contactClose.focus();
    }

    function closeContact() {
      contactModal.classList.remove(
        "is-open"
      );

      contactModal.setAttribute(
        "aria-hidden",
        "true"
      );

      restorePreviousFocus();
    }

    openContactButton.addEventListener(
      "click",
      openContact
    );

    contactClose.addEventListener(
      "click",
      closeContact
    );

    contactModal.addEventListener(
      "click",
      (event) => {
        if (
          event.target === contactModal
        ) {
          closeContact();
        }
      }
    );

    function restorePreviousFocus() {
      if (
        previouslyFocusedElement &&
        document.contains(
          previouslyFocusedElement
        )
      ) {
        previouslyFocusedElement.focus();
      }
    }

    document.addEventListener(
      "keydown",
      (event) => {
        if (event.key !== "Escape") {
          return;
        }

        if (
          contactModal.classList.contains(
            "is-open"
          )
        ) {
          closeContact();
          return;
        }

        if (
          viewer.classList.contains(
            "is-open"
          )
        ) {
          closeViewer();
          return;
        }

        if (
          categoryPanel.classList.contains(
            "is-open"
          )
        ) {
          categoryPanel.classList.remove(
            "is-open"
          );

          mobileCategoryToggle.setAttribute(
            "aria-expanded",
            "false"
          );
        }
      }
    );

    mobileCategoryToggle.addEventListener(
      "click",
      () => {
        const willOpen =
          !categoryPanel.classList.contains(
            "is-open"
          );

        categoryPanel.classList.toggle(
          "is-open",
          willOpen
        );

        mobileCategoryToggle.setAttribute(
          "aria-expanded",
          String(willOpen)
        );
      }
    );

    let cursorX =
      window.innerWidth / 2;

    let cursorY =
      window.innerHeight / 2;

    let renderedCursorX = cursorX;
    let renderedCursorY = cursorY;

    window.addEventListener(
      "mousemove",
      (event) => {
        cursorX = event.clientX;
        cursorY = event.clientY;

        cursor.classList.add(
          "is-visible"
        );
      }
    );

    document.documentElement.addEventListener(
      "mouseleave",
      () => {
        cursor.classList.remove(
          "is-visible"
        );
      }
    );

    function animateCursor() {
      renderedCursorX +=
        (cursorX - renderedCursorX) *
        0.18;

      renderedCursorY +=
        (cursorY - renderedCursorY) *
        0.18;

      cursor.style.transform =
        `translate3d(${renderedCursorX}px, ${renderedCursorY}px, 0)` +
        " translate(-50%, -50%)";

      requestAnimationFrame(
        animateCursor
      );
    }

    function registerCursorTargets() {
      document
        .querySelectorAll(".interactive")
        .forEach((element) => {
          if (
            element.dataset
              .cursorRegistered === "true"
          ) {
            return;
          }

          element.dataset.cursorRegistered =
            "true";

          element.addEventListener(
            "mouseenter",
            () => {
              cursor.classList.add(
                "is-hovering"
              );

              if (
                element.classList.contains(
                  "media-trigger"
                )
              ) {
                cursor.classList.add(
                  "is-viewing"
                );

                cursor.dataset.label =
                  "VIEW";
              }
            }
          );

          element.addEventListener(
            "mouseleave",
            () => {
              cursor.classList.remove(
                "is-hovering",
                "is-viewing"
              );

              cursor.dataset.label = "";
            }
          );
        });
    }

    function handleInitialRoute() {
      const hash =
        window.location.hash;

      if (
        hash.startsWith("#project/")
      ) {
        const projectId =
          hash.replace(
            "#project/",
            ""
          );

        const exists =
          PORTFOLIO_DATA.some(
            (project) =>
              project.id === projectId
          );

        if (exists) {
          openProject(projectId);
          return;
        }
      }

      if (hash === "#projects") {
        showPage("projects", false);
        return;
      }

      showPage("home", false);
    }

    initializeContact();
    renderProjectIndex();
    registerCursorTargets();
    animateCursor();
    handleInitialRoute();
  </script>
</body>
</html>
