<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />

  <meta
    name="description"
    content="Edward Katuuk - Personal Website"
  />

  <title>Edward Katuuk</title>

  <meta name="theme-color" content="#050505">

  <script>
    (() => {
      const allowedThemes = new Set([
        "dark", "light", "blue", "red",
        "purple", "pink", "forest"
      ]);

      let savedTheme = "dark";

      try {
        const storedTheme = localStorage.getItem("portfolio-theme");
        if (allowedThemes.has(storedTheme)) savedTheme = storedTheme;
      } catch (error) {
        /* Storage may be blocked; dark remains the safe default. */
      }

      document.documentElement.dataset.theme = savedTheme;
    })();
  </script>

  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">

  <link rel="preconnect" href="https://mp3tourl.com" crossorigin>
  <link rel="preconnect" href="https://www.image2url.com" crossorigin>
  <link rel="preconnect" href="https://i.ytimg.com" crossorigin>
  <link rel="preconnect" href="https://images.unsplash.com" crossorigin>
  <link rel="preconnect" href="https://wsrv.nl" crossorigin>
  
  <style>
    :root {
      --background: #000;
      --foreground: #f5f5f5;
      --muted: #858585;
      --panel: #181818;
      --border: rgba(255, 255, 255, 0.13);
      --page-x: clamp(28px, 7.1vw, 138px);
      --page-y: clamp(28px, 8.5vh, 92px);
      --gallery-gap: 5px;
      --font-main: "Helvetica Neue", Helvetica, Arial, sans-serif;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --spot-x: 50%;
      --spot-y: 50%;
    }

    @media (prefers-reduced-motion: no-preference) {
      html {
        scroll-behavior: smooth;
      }
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    * {
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      color: var(--foreground);
      background: var(--background);
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    html::-webkit-scrollbar,
    body::-webkit-scrollbar {
      display: none;
    }

    body {
      overflow: hidden;
      font-family: var(--font-main);
      font-weight: 400;
      letter-spacing: -0.055em;
      cursor: none;
    }

    button,
    a {
      color: inherit;
      font: inherit;
      cursor: none;
    }

    button {
      appearance: none;
      border: 0;
      background: none;
    }

    a {
      text-decoration: none;
    }

    img,
    video,
    iframe {
      display: block;
      max-width: 100%;
    }

    iframe {
      border: 0;
    }

    ::selection {
      color: #000;
      background: #fff;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      background: #000;
    }

    .page {
      position: absolute;
      inset: 0;
      visibility: hidden;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      transform: translateY(28px) scale(0.98);
      filter: blur(8px);
      will-change: opacity, transform, filter;
      transition:
        opacity 700ms var(--ease),
        transform 750ms var(--ease),
        filter 700ms var(--ease),
        visibility 750ms;
    }

    .page.is-active {
      visibility: visible;
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0) scale(1);
      filter: blur(0);
    }

    .fade-item {
      opacity: 0;
      transform: translateY(26px);
      transition:
        opacity 800ms var(--ease-out),
        transform 800ms var(--ease-out);
    }

    .page.is-active .fade-item {
      opacity: 1;
      transform: translateY(0);
    }

    .home-composition > *:nth-child(1) { transition-delay: 60ms; }
    .home-composition > *:nth-child(2) { transition-delay: 150ms; }
    .home-composition > *:nth-child(3) { transition-delay: 90ms; }
    .home-composition > *:nth-child(4) { transition-delay: 210ms; }

    .cursor {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 9999;
      width: 18px;
      height: 18px;
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      transform: translate3d(-50%, -50%, 0) scale(1);
      transition:
        width 320ms var(--ease-spring),
        height 320ms var(--ease-spring),
        background-color 250ms var(--ease),
        border-color 250ms var(--ease),
        opacity 200ms ease;
      mix-blend-mode: difference;
    }

    .cursor.is-visible {
      opacity: 1;
    }

    .cursor.is-hovering {
      width: 46px;
      height: 46px;
      border-color: #fff;
      background: #fff;
    }

    .cursor.is-viewing {
      width: 76px;
      height: 76px;
    }

    .cursor.is-clicking {
      width: 14px;
      height: 14px;
    }

    .cursor.is-hovering.is-clicking {
      width: 40px;
      height: 40px;
    }

    .cursor::after {
      content: attr(data-label);
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #000;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0;
      opacity: 0;
    }

    .cursor.is-viewing::after {
      opacity: 1;
    }

    /* =========================================================
       HOME
    ========================================================== */

    .home-page {
      display: grid;
      place-items: center;
      padding: var(--page-y) var(--page-x);
    }

    .home-page::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;

      background: radial-gradient(
        520px circle at var(--spot-x) var(--spot-y),
        rgba(255, 255, 255, 0.06),
        transparent 70%
      );

      opacity: 0;
      transition: opacity 600ms var(--ease);
      pointer-events: none;
    }

    .home-page.is-active::before {
      opacity: 1;
    }

    .home-composition {
      position: relative;
      z-index: 1;
    }

    .home-composition {
      width: min(100%, 1040px);

      display: grid;

      grid-template-columns:
        minmax(220px, 315px)
        minmax(360px, 490px)
        minmax(145px, 215px);

      grid-template-rows:
        minmax(0, 1fr)
        54px;

      grid-template-areas:
        "work portrait intro"
        "contact portrait intro";

      align-items: stretch;

      gap:
        clamp(12px, 1vw, 20px)
        clamp(14px, 1.2vw, 24px);

      margin-left: clamp(0px, 7vw, 140px);
    }

    .work-button {
      grid-area: work;
      position: relative;

      width: 100%;
      min-width: 0;
      max-width: 100%;
      height: 100%;
      min-height: 0;

      overflow: hidden;

      color: #fff;
      background: var(--panel);

      container-type: inline-size;
      isolation: isolate;

      transition:
        color 350ms var(--ease),
        background-color 350ms var(--ease),
        transform 450ms var(--ease-spring);
    }

    .work-button::before {
      content: "";
      position: absolute;
      inset: -20%;
      z-index: 1;

      background: linear-gradient(
        115deg,
        transparent 30%,
        rgba(255, 255, 255, 0.55) 48%,
        transparent 66%
      );

      transform: translateX(-120%);
      pointer-events: none;
    }

    .work-button:hover::before {
      transform: translateX(120%);
      transition: transform 850ms var(--ease-out);
    }

    .work-button:hover,
    .work-button:focus-visible {
      color: #000;
      background: #f2f2f2;
      outline: none;
      transform: translateY(-3px);
    }

    .work-button:active {
      transform: translateY(-1px) scale(0.985);
      transition-duration: 120ms;
    }

    .work-button-inner {
      position: absolute;
      z-index: 2;
      inset: 0;

      display: flex;
      align-items: center;

      overflow: hidden;

      padding:
        clamp(24px, 16cqw, 52px)
        clamp(20px, 15cqw, 48px);
    }

    .work-button-label {
      display: flex;
      flex-direction: column;
      align-items: flex-start;

      max-width: 100%;
      overflow: hidden;

      font-size: clamp(38px, 21cqw, 68px);
      line-height: 0.9;
      letter-spacing: -0.08em;
    }

    .work-button-line {
      display: block;
      white-space: nowrap;
    }

    .contact-button {
      grid-area: contact;

      width: 100%;
      min-height: 54px;

      display: flex;
      align-items: center;
      justify-content: space-between;

      padding: 0 18px;

      color: var(--muted);
      background: #111;

      font-size: 14px;
      letter-spacing: -0.025em;

      transition:
        color 300ms var(--ease),
        background-color 300ms var(--ease);
    }

    .contact-button::after {
      content: "↗";
      font-size: 17px;
      display: inline-block;
      transition: transform 400ms var(--ease-spring);
    }

    .contact-button:hover,
    .contact-button:focus-visible {
      color: #000;
      background: #f2f2f2;
      outline: none;
    }

    .contact-button:hover::after {
      transform: translate(3px, -3px);
    }

    .portrait-frame {
      grid-area: portrait;
      position: relative;

      min-width: 0;
      width: 100%;
      aspect-ratio: 1;

      overflow: hidden;
      perspective: 800px;

      padding: 10px;
      background: #171717;
    }

    .portrait-frame img {
      width: 100%;
      height: 100%;

      object-fit: cover;
      filter: grayscale(1);
      transform-style: preserve-3d;
      will-change: transform;

      transition:
        filter 500ms var(--ease),
        transform 300ms var(--ease-out);
    }

    .portrait-frame:hover img {
      filter: grayscale(0);
      transform:
        rotateX(var(--tilt-y, 0deg))
        rotateY(var(--tilt-x, 0deg))
        scale(1.06);
    }

    .intro-copy {
      grid-area: intro;
      align-self: stretch;

      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .intro-name {
      font-size: clamp(20px, 1.35vw, 28px);
      line-height: 1.2;
      letter-spacing: -0.06em;
    }

    .intro-words {
      flex: 1;

      display: flex;
      flex-direction: column;
      justify-content: space-between;

      padding-top: clamp(62px, 8vh, 130px);

      color: var(--muted);

      font-size: clamp(16px, 1.15vw, 23px);
      line-height: 1;
    }

    .intro-words span {
      display: inline-block;
      white-space: nowrap;

      opacity: 0;
      transform: translateY(14px);
      transition:
        opacity 650ms var(--ease-out),
        transform 650ms var(--ease-out);
    }

    .page.is-active .intro-words span:nth-child(1) { transition-delay: 320ms; }
    .page.is-active .intro-words span:nth-child(2) { transition-delay: 390ms; }
    .page.is-active .intro-words span:nth-child(3) { transition-delay: 460ms; }
    .page.is-active .intro-words span:nth-child(4) { transition-delay: 530ms; }

    .page.is-active .intro-words span {
      opacity: 1;
      transform: translateY(0);
    }

    /* =========================================================
       PROJECT INDEX
    ========================================================== */

    .project-index-page {
      display: grid;
      place-items: center;
      padding: var(--page-y) var(--page-x);
    }

    .project-index-wrap {
      width: min(100%, 1000px);

      display: flex;
      flex-direction: column;
      align-items: center;

      gap: clamp(15px, 2.5vh, 28px);
    }

    .project-link {
      position: relative;

      color: #f5f5f5;

      font-size: clamp(35px, 3.05vw, 60px);
      line-height: 1;
      letter-spacing: -0.075em;
      text-align: center;

      transition:
        color 300ms var(--ease),
        transform 350ms var(--ease-spring),
        letter-spacing 350ms var(--ease);
    }

    .project-link::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -6px;

      width: 0;
      height: 2px;

      background: currentColor;
      opacity: 0.5;

      transform: translateX(-50%);
      transition: width 400ms var(--ease-out);
    }

    .project-link:hover {
      color: var(--muted);
      transform: translateY(-4px);
      letter-spacing: -0.06em;
    }

    .project-link:hover::after {
      width: 60%;
    }

    .back-button {
      position: fixed;
      top: 34px;
      left: var(--page-x);
      z-index: 80;

      display: inline-flex;
      align-items: center;
      gap: 4px;

      color: var(--muted);

      font-size: 14px;
      letter-spacing: -0.02em;

      transition:
        color 250ms var(--ease),
        transform 300ms var(--ease-out);
    }

    .back-button:hover {
      color: #fff;
      transform: translateX(-4px);
    }

    /* =========================================================
       DETAIL
    ========================================================== */

    .project-detail-page {
      padding: 0 var(--page-x);
    }

    .detail-layout {
      width: 100%;
      height: 100%;

      display: grid;

      grid-template-columns:
        minmax(350px, 31vw)
        minmax(0, 1fr);

      gap: clamp(40px, 6.3vw, 122px);
    }

    .category-panel {
      position: relative;
      z-index: 3;

      height: 100%;

      overflow-y: auto;

      padding-top: clamp(112px, 11.8vh, 128px);
      padding-bottom: 50px;

      background: #000;

      scrollbar-width: none;
    }

    .category-panel::-webkit-scrollbar {
      display: none;
    }

    .category-list {
      display: flex;
      flex-direction: column;
      align-items: flex-start;

      gap: clamp(26px, 4vh, 48px);
    }

    .category-button {
      position: relative;
      max-width: 100%;

      padding-left: 0;

      color: var(--muted);

      font-size: clamp(30px, 2.55vw, 50px);
      line-height: 1;
      letter-spacing: -0.07em;
      text-align: left;

      transition:
        color 300ms var(--ease),
        transform 350ms var(--ease-spring),
        padding-left 350ms var(--ease-spring);
    }

    .category-button::before {
      content: "";
      position: absolute;
      top: 50%;
      left: -18px;

      width: 0;
      height: 2px;

      background: #fff;

      transform: translateY(-50%);
      transition: width 350ms var(--ease-spring);
    }

    .category-button:hover {
      color: #d9d9d9;
      transform: translateX(8px);
    }

    .category-button.is-active {
      color: #fff;
      padding-left: 26px;
    }

    .category-button.is-active::before {
      width: 18px;
    }

    .category-info {
      display: none;

      margin-top: clamp(45px, 7vh, 78px);
      padding-bottom: 50px;

      animation: info-in 500ms var(--ease) both;
    }

    .category-info.is-visible {
      display: block;
    }

    .category-info-label {
      margin-bottom: 20px;

      color: var(--muted);

      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .category-info-title {
      margin-bottom: 35px;

      font-size: clamp(25px, 2.1vw, 38px);
      font-weight: 400;
      line-height: 1;
      letter-spacing: -0.065em;
    }

    .category-info-meta {
      display: grid;
      gap: 16px;

      margin-bottom: 34px;
    }

    .category-info-row {
      display: grid;
      grid-template-columns: 78px 1fr;

      gap: 12px;

      padding-top: 12px;

      border-top: 1px solid var(--border);

      font-size: 13px;
      line-height: 1.4;
      letter-spacing: -0.02em;
    }

    .category-info-key {
      color: var(--muted);
    }

    .category-info-value {
      color: #fff;
    }

    .category-info-description {
      color: #aaa;

      font-size: clamp(15px, 1vw, 18px);
      line-height: 1.5;
      letter-spacing: -0.03em;

      white-space: pre-line;
    }

    @keyframes info-in {
      from {
        opacity: 0;
        transform: translateY(15px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    /* =========================================================
       GALLERY — CSS COLUMNS MASONY FIX (v2 Style)
    ========================================================== */

    .gallery-scroll {
      width: 100%;

      height: 100vh;
      height: 100dvh;

      overflow-x: hidden;
      overflow-y: auto;

      padding:
        clamp(112px, 11.8vh, 128px)
        0
        0;

      scrollbar-width: none;
    }

    .gallery-scroll::-webkit-scrollbar {
      display: none;
    }

    .gallery-grid {
      column-count: 3;
      column-gap: var(--gallery-gap);
      width: 100%;
      font-size: 0;
      line-height: 0;
    }

    .gallery-card {
      position: relative;
      display: block;
      width: 100%;
      min-width: 0;
      margin: 0 0 var(--gallery-gap) 0;
      break-inside: avoid;

      overflow: hidden;

      background: #999;

      content-visibility: auto;
      contain-intrinsic-size: 420px 560px;

      opacity: 0;
      transform: translateY(36px) scale(0.97);
      transition:
        opacity 700ms var(--ease-out),
        transform 700ms var(--ease-out),
        box-shadow 400ms var(--ease);
    }

    .gallery-card.is-visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .gallery-card:hover {
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.45);
    }

    .gallery-card::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;

      background: linear-gradient(
        100deg,
        #161616 40%,
        #232323 50%,
        #161616 60%
      );
      background-size: 220% 100%;

      animation: skeleton-shimmer 1500ms ease-in-out infinite;
      opacity: 1;
      transition: opacity 350ms var(--ease);
    }

    .gallery-card.is-loaded::before {
      opacity: 0;
      animation: none;
    }

    @keyframes skeleton-shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -20% 0; }
    }

    .gallery-card[data-ratio="portrait"] {
      aspect-ratio: 9 / 16;
    }

    .gallery-card[data-ratio="portrait-wide"] {
      aspect-ratio: 3 / 4;
    }

    .gallery-card[data-ratio="square"] {
      aspect-ratio: 1;
    }

    .gallery-card[data-ratio="landscape"] {
      aspect-ratio: 16 / 9;
    }

    .gallery-card[data-ratio="landscape-four-three"] {
      aspect-ratio: 4 / 3;
    }

    .gallery-card[data-ratio="wide"] {
      aspect-ratio: 21 / 9;
    }

    .gallery-card img,
    .gallery-card video {
      position: relative;
      z-index: 1;

      width: 100%;
      height: 100%;
      max-width: none;

      object-fit: cover;

      opacity: 0;
      transition:
        transform 750ms var(--ease),
        filter 350ms,
        opacity 450ms var(--ease);
    }

    .gallery-card.is-loaded img,
    .gallery-card.is-loaded video {
      opacity: 1;
    }

    .gallery-card:hover img,
    .gallery-card:hover video {
      filter: brightness(0.76);
      transform: scale(1.035);
    }

    .gallery-card-info {
      position: absolute;
      right: 0;
      bottom: 0;
      left: 0;
      z-index: 2;

      display: flex;
      align-items: flex-end;
      justify-content: space-between;

      gap: 20px;

      padding: 18px;

      background:
        linear-gradient(
          to top,
          rgba(0, 0, 0, 0.86),
          transparent
        );

      opacity: 0;
      transform: translateY(10px);

      transition:
        opacity 300ms,
        transform 350ms var(--ease);
    }

    .gallery-card:hover .gallery-card-info,
    .gallery-card:focus-visible .gallery-card-info {
      opacity: 1;
      transform: none;
    }

    .gallery-card-title {
      font-size: clamp(16px, 1.15vw, 22px);
      line-height: 1.05;
      letter-spacing: -0.045em;
    }

    .gallery-card-type {
      color: rgba(255, 255, 255, 0.7);

      font-size: 11px;
      line-height: 1;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .play-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      z-index: 3;

      width: 0;
      height: 0;

      border-top: 18px solid transparent;
      border-bottom: 18px solid transparent;
      border-left: 29px solid rgba(40, 40, 40, 0.75);

      transform: translate(-42%, -50%);

      pointer-events: none;
    }

    .gallery-empty {
      min-height: 60vh;
      grid-column: 1 / -1;

      display: grid;
      place-items: center;

      color: var(--muted);

      font-size: clamp(24px, 3vw, 48px);
      line-height: 1.15;
      text-align: center;
    }

    /* =========================================================
       VIEWER
    ========================================================== */

    .viewer {
      position: fixed;
      inset: 0;
      z-index: 500;

      visibility: hidden;

      display: grid;
      grid-template-rows: auto minmax(0, 1fr);

      padding:
        max(22px, env(safe-area-inset-top))
        max(24px, env(safe-area-inset-right))
        max(22px, env(safe-area-inset-bottom))
        max(24px, env(safe-area-inset-left));

      background: rgba(0, 0, 0, 0.96);
      backdrop-filter: blur(0px);

      opacity: 0;

      transition:
        opacity 450ms var(--ease),
        backdrop-filter 450ms var(--ease),
        visibility 450ms;
    }

    .viewer.is-open {
      visibility: visible;
      opacity: 1;
      backdrop-filter: blur(16px);
    }

    .viewer-media-shell {
      opacity: 0;
      transform: scale(0.92);
      transition:
        opacity 500ms var(--ease-out) 80ms,
        transform 550ms var(--ease-spring) 80ms;
    }

    .viewer.is-open .viewer-media-shell {
      opacity: 1;
      transform: scale(1);
    }

    .viewer-caption {
      opacity: 0;
      transform: translateY(16px);
      transition:
        opacity 500ms var(--ease-out) 180ms,
        transform 500ms var(--ease-out) 180ms;
    }

    .viewer.is-open .viewer-caption {
      opacity: 1;
      transform: translateY(0);
    }

    .viewer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;

      gap: 20px;

      padding-bottom: 18px;

      font-size: 14px;
      letter-spacing: -0.02em;
    }

    .viewer-close {
      color: var(--muted);
    }

    .viewer-close:hover {
      color: #fff;
    }

    .viewer-body {
      min-height: 0;

      display: grid;

      grid-template-columns:
        minmax(0, 1fr)
        minmax(220px, 300px);

      gap: clamp(26px, 4vw, 74px);

      overflow: hidden;
    }

    .viewer-media-area {
      min-width: 0;
      min-height: 0;

      display: grid;
      place-items: center;

      overflow: hidden;
    }

    .viewer-media-shell {
      position: relative;

      width: min(100%, 1400px);
      height: min(100%, 86vh);

      display: grid;
      place-items: center;

      overflow: hidden;

      background: #0a0a0a;
    }

    .viewer-media-shell[data-ratio="portrait"] {
      width: min(100%, calc(82vh * 9 / 16));
      aspect-ratio: 9 / 16;
      height: auto;
    }

    .viewer-media-shell[data-ratio="portrait-wide"] {
      width: min(100%, calc(82vh * 3 / 4));
      aspect-ratio: 3 / 4;
      height: auto;
    }

    .viewer-media-shell[data-ratio="square"] {
      width: min(100%, 82vh);
      aspect-ratio: 1;
      height: auto;
    }

    .viewer-media-shell[data-ratio="landscape"] {
      aspect-ratio: 16 / 9;
      height: auto;
    }

    .viewer-media-shell[data-ratio="landscape-four-three"] {
      width: min(100%, calc(82vh * 4 / 3));
      aspect-ratio: 4 / 3;
      height: auto;
    }

    .viewer-media-shell[data-ratio="wide"] {
      aspect-ratio: 21 / 9;
      height: auto;
    }

    .viewer-media-shell img,
    .viewer-media-shell video,
    .viewer-media-shell iframe {
      width: 100%;
      height: 100%;

      object-fit: contain;

      background: #0a0a0a;
    }

    .viewer-caption {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;

      padding-bottom: 40px;
    }

    .viewer-item-type {
      margin-bottom: 15px;

      color: var(--muted);

      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .viewer-item-title {
      font-size: clamp(35px, 3.3vw, 62px);
      font-weight: 400;
      line-height: 0.92;
      letter-spacing: -0.075em;
    }

    .viewer-error {
      padding: 45px;

      color: #b7b7b7;
      background: #111;

      font-size: 22px;
      line-height: 1.3;
      text-align: center;
    }

    /* =========================================================
       CONTACT
    ========================================================== */

    .contact-modal {
      position: fixed;
      inset: 0;
      z-index: 600;

      visibility: hidden;

      display: grid;
      place-items: center;

      padding: 22px;

      background: rgba(0, 0, 0, 0.88);
      backdrop-filter: blur(0px);

      opacity: 0;

      transition:
        opacity 400ms var(--ease),
        backdrop-filter 400ms var(--ease),
        visibility 400ms;
    }

    .contact-modal.is-open {
      visibility: visible;
      opacity: 1;
      backdrop-filter: blur(16px);
    }

    .contact-card {
      position: relative;

      width: min(100%, 650px);

      padding: clamp(30px, 5vw, 70px);

      background: #141414;

      opacity: 0;
      transform: translateY(24px) scale(0.96);
      transition:
        opacity 450ms var(--ease-out) 60ms,
        transform 500ms var(--ease-spring) 60ms;
    }

    .contact-modal.is-open .contact-card {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .contact-link {
      opacity: 0;
      transform: translateX(-10px);
      transition:
        opacity 450ms var(--ease-out),
        transform 450ms var(--ease-out),
        border-color 250ms;
    }

    .contact-modal.is-open .contact-link:nth-child(1) { transition-delay: 220ms; }
    .contact-modal.is-open .contact-link:nth-child(2) { transition-delay: 290ms; }

    .contact-modal.is-open .contact-link {
      opacity: 1;
      transform: translateX(0);
    }

    .contact-close {
      position: absolute;
      top: 20px;
      right: 22px;

      color: var(--muted);

      font-size: 14px;
    }

    .contact-eyebrow {
      margin-bottom: clamp(55px, 10vh, 110px);

      color: var(--muted);

      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .contact-heading {
      margin-bottom: clamp(45px, 8vh, 85px);

      font-size: clamp(40px, 5vw, 74px);
      font-weight: 400;
      line-height: 0.92;
      letter-spacing: -0.075em;
    }

    .contact-links {
      display: grid;
    }

    .contact-link {
      display: flex;
      justify-content: space-between;

      gap: 20px;

      padding: 17px 0;

      border-top: 1px solid var(--border);

      font-size: clamp(16px, 1.5vw, 22px);
    }

    .contact-link:last-child {
      border-bottom: 1px solid var(--border);
    }

    .contact-link::after {
      content: "↗";
      color: var(--muted);
    }

    .mobile-category-toggle {
      display: none;
    }

    /* =========================================================
       RESPONSIVE
    ========================================================== */

    @media (max-width: 1180px) {
      .home-composition {
        grid-template-columns:
          minmax(205px, 285px)
          minmax(340px, 450px)
          minmax(130px, 175px);

        margin-left: 0;
      }

      .detail-layout {
        grid-template-columns:
          minmax(290px, 34vw)
          minmax(0, 1fr);

        gap: 45px;
      }

      .gallery-grid {
        column-count: 3;
      }
    }

    @media (max-width: 820px) {
      :root {
        --page-x: 22px;
        --page-y: 22px;
        --gallery-gap: 4px;
      }

      body,
      button,
      a {
        cursor: auto;
      }

      .cursor {
        display: none;
      }

      .home-page,
      .project-index-page {
        overflow-y: auto;
      }

      .home-composition {
        width: min(100%, 520px);

        grid-template-columns: 1fr;
        grid-template-rows: auto;

        grid-template-areas:
          "portrait"
          "work"
          "contact"
          "intro";

        align-items: stretch;

        margin-left: 0;
        padding: 55px 0;
      }

      .work-button {
        height: auto;
        aspect-ratio: 1.45 / 1;
      }

      .intro-copy {
        min-height: 240px;
      }

      .project-index-wrap {
        align-items: flex-start;
        padding: 100px 0;
      }

      .project-link {
        text-align: left;
      }

      .project-detail-page {
        padding: 0;
      }

      .detail-layout {
        display: block;
      }

      .category-panel {
        position: fixed;
        top: 0;
        right: 0;
        left: 0;
        z-index: 60;

        height: auto;
        overflow: visible;

        padding: 20px 22px;

        border-bottom: 1px solid var(--border);

        background: #000;
      }

      .mobile-category-toggle {
        width: 100%;

        display: flex;
        justify-content: space-between;

        color: #fff;

        font-size: 17px;
      }

      .mobile-category-toggle::after {
        content: "+";

        color: var(--muted);

        font-size: 25px;
      }

      .category-panel.is-open
      .mobile-category-toggle::after {
        content: "−";
      }

      .category-list {
        position: absolute;
        top: 100%;
        right: 0;
        left: 0;

        display: none;

        gap: 0;

        max-height: calc(100dvh - 65px);

        overflow-y: auto;

        padding: 8px 22px 25px;

        border-bottom: 1px solid var(--border);

        background: #000;
      }

      .category-panel.is-open
      .category-list {
        display: flex;
      }

      .category-button {
        width: 100%;

        padding: 13px 0;

        font-size: 27px;
      }

      .category-info {
        position: static;

        margin-top: 0;
        padding: 30px 22px 45px;

        border-bottom: 1px solid var(--border);
      }

      .gallery-scroll {
        height: 100vh;
        height: 100dvh;

        padding: 65px 0 0;
      }

      .gallery-grid {
        column-count: 2;
      }

      .gallery-card-info {
        opacity: 1;
        transform: none;
      }

      .back-button {
        top: auto;

        bottom:
          max(
            18px,
            env(safe-area-inset-bottom)
          );

        left: 22px;

        padding: 10px 14px;

        border-radius: 999px;

        background: #191919;
      }

      .viewer {
        padding:
          max(16px, env(safe-area-inset-top))
          14px
          max(16px, env(safe-area-inset-bottom));
      }

      .viewer-body {
        grid-template-columns: 1fr;

        grid-template-rows:
          minmax(0, 1fr)
          auto;

        overflow-y: auto;
      }

      .viewer-caption {
        padding: 15px 0 35px;
      }

      .contact-card {
        padding: 55px 25px 30px;
      }
    }

    @media (max-width: 520px) {
      .gallery-grid {
        column-count: 1;
      }

      .viewer-item-title {
        font-size: 39px;
      }

      .contact-heading {
        font-size: 42px;
      }
    }

    @media (hover: none), (pointer: coarse) {
      body,
      button,
      a {
        cursor: auto;
      }

      .cursor {
        display: none;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        transition-duration: 1ms !important;
      }
    }


    /* =========================================================
       MOTION SYSTEM — ENHANCED EDITION
       ========================================================== */

    :root {
      --motion-fast: 260ms;
      --motion-medium: 560ms;
      --motion-slow: 900ms;
      --ease-cinematic: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-expressive: cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    #app::before,
    #app::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    #app::before {
      z-index: 0;
      background:
        radial-gradient(circle at 18% 16%, rgba(255,255,255,0.045), transparent 29%),
        radial-gradient(circle at 82% 76%, rgba(255,255,255,0.025), transparent 32%);
      animation: ambient-drift 16s ease-in-out infinite alternate;
    }

    #app::after {
      z-index: 90;
      opacity: 0.045;
      background-image:
        linear-gradient(rgba(255,255,255,0.15) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.12) 1px, transparent 1px);
      background-size: 72px 72px;
      mask-image: radial-gradient(circle at center, #000 0%, transparent 72%);
    }

    @keyframes ambient-drift {
      from { transform: scale(1) translate3d(-1%, -1%, 0); }
      to { transform: scale(1.08) translate3d(1%, 1%, 0); }
    }

    .page {
      z-index: 1;
      clip-path: inset(3% 0 0 0 round 2px);
      transform: translate3d(0, 34px, 0) scale(0.985);
      filter: blur(12px) saturate(0.8);
      transition:
        opacity 620ms var(--ease-cinematic),
        transform 760ms var(--ease-cinematic),
        filter 680ms var(--ease-cinematic),
        clip-path 760ms var(--ease-cinematic),
        visibility 760ms;
    }

    .page.is-active {
      clip-path: inset(0 round 0);
      transform: translate3d(0, 0, 0) scale(1);
      filter: blur(0) saturate(1);
    }

    html.is-transitioning,
    html.is-transitioning * {
      cursor: none !important;
    }

    html.is-transitioning .page {
      pointer-events: none !important;
    }

    ::view-transition-old(root),
    ::view-transition-new(root) {
      animation-duration: 680ms;
      animation-fill-mode: both;
      animation-timing-function: var(--ease-cinematic);
    }

    ::view-transition-old(root) { z-index: 1; }
    ::view-transition-new(root) { z-index: 2; }

    html[data-nav-direction="forward"]::view-transition-old(root) {
      animation-name: route-out-forward;
    }

    html[data-nav-direction="forward"]::view-transition-new(root) {
      animation-name: route-in-forward;
    }

    html[data-nav-direction="back"]::view-transition-old(root) {
      animation-name: route-out-back;
    }

    html[data-nav-direction="back"]::view-transition-new(root) {
      animation-name: route-in-back;
    }

    @keyframes route-out-forward {
      to {
        opacity: 0;
        transform: scale(0.965) translate3d(0, -22px, 0);
        filter: blur(14px);
      }
    }

    @keyframes route-in-forward {
      from {
        opacity: 0;
        transform: scale(1.025) translate3d(0, 32px, 0);
        filter: blur(16px);
        clip-path: inset(7% 0 0 0);
      }
    }

    @keyframes route-out-back {
      to {
        opacity: 0;
        transform: scale(1.02) translate3d(0, 28px, 0);
        filter: blur(14px);
      }
    }

    @keyframes route-in-back {
      from {
        opacity: 0;
        transform: scale(0.97) translate3d(0, -22px, 0);
        filter: blur(14px);
      }
    }

    .cursor {
      view-transition-name: none;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.05);
    }

    .cursor::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: #fff;
      transform: translate(-50%, -50%);
      transition: opacity 200ms ease, transform 300ms var(--ease-spring);
    }

    .cursor.is-hovering::before {
      opacity: 0;
      transform: translate(-50%, -50%) scale(0);
    }

    .home-page::before {
      background:
        radial-gradient(
          560px circle at var(--spot-x) var(--spot-y),
          rgba(255, 255, 255, 0.075),
          transparent 68%
        );
    }

    .home-composition {
      perspective: 1200px;
    }

    .work-button {
      --press-scale: 1;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.015);
    }

    .work-button::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      opacity: 0;
      background:
        radial-gradient(circle at var(--button-x, 50%) var(--button-y, 50%), rgba(255,255,255,0.22), transparent 34%);
      transition: opacity 420ms var(--ease);
      pointer-events: none;
    }

    .work-button:hover::after,
    .work-button:focus-visible::after {
      opacity: 1;
    }

    .work-button-inner {
      transition: transform 500ms var(--ease-cinematic);
      transform: translate3d(var(--mag-x, 0px), var(--mag-y, 0px), 0) scale(var(--press-scale));
      will-change: transform;
    }

    .work-button:active {
      --press-scale: 0.975;
    }

    .work-button-line {
      position: relative;
      transition: transform 620ms var(--ease-cinematic);
    }

    .work-button:hover .work-button-line:nth-child(1),
    .work-button:focus-visible .work-button-line:nth-child(1) {
      transform: translateX(10px);
    }

    .work-button:hover .work-button-line:nth-child(2),
    .work-button:focus-visible .work-button-line:nth-child(2) {
      transform: translateX(22px);
      transition-delay: 55ms;
    }

    .portrait-frame {
      isolation: isolate;
      transition: transform 650ms var(--ease-cinematic), background-color 400ms var(--ease);
    }

    .portrait-frame::before,
    .portrait-frame::after {
      content: "";
      position: absolute;
      pointer-events: none;
    }

    .portrait-frame::before {
      inset: 10px;
      z-index: 2;
      border: 1px solid rgba(255,255,255,0.14);
      opacity: 0;
      transform: scale(0.97);
      transition: opacity 450ms var(--ease), transform 600ms var(--ease-cinematic);
    }

    .portrait-frame::after {
      inset: 10px;
      z-index: 3;
      background: linear-gradient(115deg, transparent 35%, rgba(255,255,255,0.2) 50%, transparent 65%);
      transform: translateX(-130%);
    }

    .portrait-frame:hover {
      transform: translateY(-5px);
      background: #202020;
    }

    .portrait-frame:hover::before {
      opacity: 1;
      transform: scale(1);
    }

    .portrait-frame:hover::after {
      transform: translateX(130%);
      transition: transform 950ms var(--ease-cinematic);
    }

    .intro-name {
      position: relative;
    }

    .intro-name::after {
      content: "";
      display: block;
      width: 28px;
      height: 1px;
      margin-top: 14px;
      background: rgba(255,255,255,0.42);
      transform-origin: left;
      transform: scaleX(0);
      transition: transform 800ms var(--ease-cinematic) 420ms;
    }

    .home-page.is-active .intro-name::after {
      transform: scaleX(1);
    }

    .project-index-wrap {
      counter-reset: portfolio-project;
    }

    .project-link {
      display: inline-flex;
      align-items: baseline;
      gap: clamp(15px, 1.8vw, 28px);
      overflow: hidden;
      padding: 3px 10px;
    }

    .project-link::before {
      content: attr(data-index);
      color: #595959;
      font-size: 11px;
      letter-spacing: 0.08em;
      transform: translateY(-0.2em);
      transition: color 300ms var(--ease), transform 400ms var(--ease-spring);
    }

    .project-link:hover::before,
    .project-link:focus-visible::before {
      color: #fff;
      transform: translate(4px, -0.2em);
    }

    .project-link::after {
      bottom: 0;
      height: 1px;
      opacity: 0.7;
    }

    .project-link:focus-visible,
    .category-button:focus-visible,
    .back-button:focus-visible,
    .viewer-close:focus-visible,
    .contact-close:focus-visible,
    .contact-link:focus-visible {
      outline: 1px solid rgba(255,255,255,0.8);
      outline-offset: 7px;
    }

    .project-detail-page.is-active .category-button {
      animation: category-enter 720ms var(--ease-cinematic) both;
      animation-delay: calc(var(--category-index, 0) * 55ms + 120ms);
    }

    @keyframes category-enter {
      from {
        opacity: 0;
        transform: translate3d(-24px, 18px, 0);
        filter: blur(7px);
      }
      to {
        opacity: 1;
        transform: translate3d(0, 0, 0);
        filter: blur(0);
      }
    }

    .category-info.is-visible {
      animation: info-in-enhanced 650ms var(--ease-cinematic) both;
    }

    @keyframes info-in-enhanced {
      from {
        opacity: 0;
        transform: translate3d(0, 24px, 0);
        filter: blur(8px);
      }
      to {
        opacity: 1;
        transform: translate3d(0, 0, 0);
        filter: blur(0);
      }
    }

    .gallery-card {
      --card-rotate-x: 0deg;
      --card-rotate-y: 0deg;
      clip-path: inset(10% 0 0 0);
      filter: blur(8px) saturate(0.72);
      transform-origin: center;
      transition:
        opacity 780ms var(--ease-cinematic),
        transform 850ms var(--ease-cinematic),
        filter 850ms var(--ease-cinematic),
        clip-path 850ms var(--ease-cinematic),
        box-shadow 420ms var(--ease);
    }

    .gallery-card.is-visible {
      clip-path: inset(0);
      filter: blur(0) saturate(1);
    }

    .gallery-card::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 2;
      opacity: 0;
      background: radial-gradient(circle at var(--card-x, 50%) var(--card-y, 50%), rgba(255,255,255,0.16), transparent 32%);
      mix-blend-mode: screen;
      pointer-events: none;
      transition: opacity 380ms var(--ease);
    }

    .gallery-card:hover {
      z-index: 4;
      transform: perspective(1000px) rotateX(var(--card-rotate-x)) rotateY(var(--card-rotate-y)) translateY(-5px) scale(1.012);
      box-shadow: 0 28px 75px rgba(0, 0, 0, 0.62);
    }

    .gallery-card:hover::after {
      opacity: 1;
    }

    .gallery-card img,
    .gallery-card video {
      filter: grayscale(0.14) contrast(1.02);
    }

    .gallery-card:hover img,
    .gallery-card:hover video {
      filter: brightness(0.7) grayscale(0) contrast(1.06);
      transform: scale(1.055);
    }

    .gallery-card-info {
      z-index: 4;
      padding: 22px;
      transform: translateY(18px);
      transition: opacity 420ms var(--ease), transform 520ms var(--ease-cinematic);
    }

    .play-icon {
      z-index: 5;
      filter: drop-shadow(0 7px 18px rgba(0,0,0,0.35));
      transition: transform 500ms var(--ease-spring), border-left-color 350ms var(--ease);
    }

    .gallery-card:hover .play-icon {
      transform: translate(-42%, -50%) scale(1.16);
      border-left-color: rgba(255,255,255,0.85);
    }

    .viewer {
      background:
        radial-gradient(circle at 50% 45%, rgba(255,255,255,0.055), transparent 38%),
        rgba(0, 0, 0, 0.94);
    }

    .viewer-media-shell {
      clip-path: inset(5% round 3px);
      filter: blur(12px);
      transition:
        opacity 520ms var(--ease-cinematic) 60ms,
        transform 680ms var(--ease-cinematic) 60ms,
        filter 680ms var(--ease-cinematic) 60ms,
        clip-path 680ms var(--ease-cinematic) 60ms;
    }

    .viewer.is-open .viewer-media-shell {
      clip-path: inset(0 round 0);
      filter: blur(0);
    }

    .viewer-header::after {
      content: "";
      flex: 1;
      height: 1px;
      margin: 0 8px;
      background: rgba(255,255,255,0.14);
      transform-origin: left;
      transform: scaleX(0);
      transition: transform 700ms var(--ease-cinematic) 180ms;
    }

    .viewer.is-open .viewer-header::after {
      transform: scaleX(1);
    }

    .contact-card {
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.09);
      box-shadow: 0 35px 100px rgba(0,0,0,0.55);
    }

    .contact-card::before {
      content: "";
      position: absolute;
      inset: -40%;
      background: radial-gradient(circle, rgba(255,255,255,0.055), transparent 58%);
      animation: contact-glow 9s ease-in-out infinite alternate;
      pointer-events: none;
    }

    .contact-card > * {
      position: relative;
      z-index: 1;
    }

    @keyframes contact-glow {
      from { transform: translate3d(-8%, -5%, 0); }
      to { transform: translate3d(10%, 8%, 0); }
    }

    @media (max-width: 820px) {
      #app::after {
        background-size: 44px 44px;
        opacity: 0.03;
      }

      .category-list {
        display: flex;
        max-height: 0;
        padding-top: 0;
        padding-bottom: 0;
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transform: translateY(-10px);
        transition:
          max-height 620ms var(--ease-cinematic),
          padding 620ms var(--ease-cinematic),
          opacity 320ms var(--ease),
          transform 520ms var(--ease-cinematic),
          visibility 620ms;
      }

      .category-panel.is-open .category-list {
        display: flex;
        max-height: calc(100dvh - 65px);
        padding-top: 8px;
        padding-bottom: 25px;
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
        transform: translateY(0);
      }

      .gallery-card {
        clip-path: inset(5% 0 0 0);
      }
    }

    @media (hover: none), (pointer: coarse) {
      .gallery-card:hover {
        transform: translateY(0) scale(1);
      }

      .gallery-card::after,
      .work-button::after {
        display: none;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      #app::before,
      .contact-card::before {
        animation: none !important;
      }

      ::view-transition-old(root),
      ::view-transition-new(root) {
        animation-duration: 1ms !important;
      }

      .page,
      .gallery-card,
      .viewer-media-shell,
      .work-button-inner,
      .work-button-line {
        clip-path: none !important;
        filter: none !important;
        transform: none !important;
      }
    }


    /* =========================================================
       TARGETED LAYOUT FIXES — v2.1
       ========================================================== */

    /* Give large glyphs enough breathing room so MY / WORK never
       gets clipped by its own line box or by the magnetic motion. */
    .work-button-inner {
      overflow: visible;
      padding-inline:
        clamp(24px, 13cqw, 46px);
    }

    .work-button-label {
      width: max-content;
      max-width: calc(100% - 4px);
      overflow: visible;
      padding: 0.12em 0.14em 0.16em 0.04em;
      margin: -0.12em -0.14em -0.16em -0.04em;
      font-size: clamp(38px, 19.5cqw, 66px);
      line-height: 0.92;
    }

    .work-button-line {
      max-width: 100%;
      line-height: inherit;
    }

    /* Reserve a real top bar inside the contact card. This keeps
       Close away from the eyebrow even on short or narrow screens. */
    .contact-card {
      padding-top: clamp(82px, 7vw, 98px);
    }

    .contact-close {
      position: absolute;
      z-index: 3;
      top: 22px;
      right: 22px;
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 7px 10px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.035);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .contact-close:hover,
    .contact-close:focus-visible {
      color: #fff;
      background: rgba(255, 255, 255, 0.085);
    }

    .contact-eyebrow {
      padding-right: 112px;
    }

    /* The old solid-black category panel hid the global ambient
       layer. Keep the desktop surface transparent so both sides of
       the project detail page feel like one continuous canvas. */
    .project-detail-page,
    .detail-layout,
    .category-panel,
    .category-info {
      background: transparent;
    }

    .category-panel {
      isolation: isolate;
    }

    .category-panel::after {
      content: "";
      position: absolute;
      inset: 0 -28px 0 calc(var(--page-x) * -1);
      z-index: -1;
      background: linear-gradient(
        90deg,
        rgba(0, 0, 0, 0.18) 0%,
        rgba(0, 0, 0, 0.08) 64%,
        transparent 100%
      );
      pointer-events: none;
    }

    @media (max-width: 820px) {
      .work-button-inner {
        overflow: visible;
        padding-inline: clamp(26px, 11cqw, 44px);
      }

      .work-button-label {
        max-width: calc(100% - 6px);
        font-size: clamp(42px, 18cqw, 68px);
      }

      .contact-card {
        padding: 82px 25px 30px;
      }

      .contact-close {
        top: 18px;
        right: 18px;
      }

      .contact-eyebrow {
        padding-right: 0;
      }

      .category-panel {
        background: rgba(0, 0, 0, 0.72);
        backdrop-filter: blur(18px) saturate(1.05);
        -webkit-backdrop-filter: blur(18px) saturate(1.05);
      }

      .category-panel::after {
        display: none;
      }

      .category-list {
        background: rgba(0, 0, 0, 0.68);
        backdrop-filter: blur(18px) saturate(1.05);
        -webkit-backdrop-filter: blur(18px) saturate(1.05);
      }

      .category-info {
        background:
          linear-gradient(
            180deg,
            rgba(0, 0, 0, 0.34),
            rgba(0, 0, 0, 0.08) 70%,
            transparent
          );
      }

      .back-button {
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(10, 10, 10, 0.68);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
      }
    }

    @media (max-width: 390px) {
      .work-button-label {
        font-size: clamp(38px, 17.5cqw, 58px);
      }

      .contact-card {
        padding-inline: 20px;
      }
    }

    html,
    body,
    #app {
      background: var(--background);
      color: var(--foreground);
    }

    #app {
      background: var(--background);
    }

    ::selection {
      color: var(--selection-fg);
      background: var(--selection-bg);
    }

    #app::before {
      background:
        radial-gradient(circle at 18% 16%, rgba(var(--accent-rgb), 0.10), transparent 29%),
        radial-gradient(circle at 82% 76%, rgba(var(--accent-rgb), 0.055), transparent 32%);
    }

    #app::after {
      background-image:
        linear-gradient(rgba(var(--grid-rgb), 0.13) 1px, transparent 1px),
        linear-gradient(90deg, rgba(var(--grid-rgb), 0.10) 1px, transparent 1px);
    }

    .home-page::before {
      background: radial-gradient(
        560px circle at var(--spot-x) var(--spot-y),
        rgba(var(--accent-rgb), 0.12),
        transparent 68%
      );
    }

    .work-button,
    .contact-button {
      color: var(--foreground);
      background: var(--panel);
      border-color: var(--border);
    }

    .work-button:hover,
    .work-button:focus-visible,
    .contact-button:hover,
    .contact-button:focus-visible {
      color: var(--accent-contrast);
      background: var(--accent);
    }

    .work-button::before {
      background: linear-gradient(
        115deg,
        transparent 30%,
        rgba(255, 255, 255, 0.58) 48%,
        transparent 66%
      );
    }

    .work-button::after {
      background: radial-gradient(
        circle at var(--button-x, 50%) var(--button-y, 50%),
        rgba(var(--accent-rgb), 0.32),
        transparent 36%
      );
    }

    .portrait-frame {
      background: var(--panel);
    }

    .portrait-frame:hover {
      background: color-mix(in srgb, var(--panel) 82%, var(--accent) 18%);
    }

    .portrait-frame::before,
    .viewer-header::after,
    .category-info-row,
    .contact-link,
    .contact-link:last-child {
      border-color: var(--border);
    }

    .intro-name::after,
    .category-button.is-active::before {
      background: var(--accent);
    }

    .project-link,
    .category-info-title,
    .category-info-value,
    .mobile-category-toggle {
      color: var(--foreground);
    }

    .project-link::before,
    .back-button,
    .category-button,
    .category-info-label,
    .category-info-key,
    .category-info-description,
    .viewer-close,
    .contact-close,
    .contact-eyebrow,
    .viewer-item-type,
    .gallery-card-type {

    }

    .project-link:hover,
    .project-link:focus-visible,
    .project-link:hover::before,
    .project-link:focus-visible::before,
    .back-button:hover,
    .back-button:focus-visible,
    .category-button:hover,
    .category-button.is-active,
    .viewer-close:hover,
    .contact-close:hover,
    .contact-close:focus-visible {
      color: var(--accent);
    }

    .project-link::after {
      background: var(--accent);
    }

    .project-link:focus-visible,
    .category-button:focus-visible,
    .back-button:focus-visible,
    .viewer-close:focus-visible,
    .contact-close:focus-visible,
    .contact-link:focus-visible,
    .theme-toggle:focus-visible,
    .theme-option:focus-visible {

        90deg,
        color-mix(in srgb, var(--background) 72%, transparent) 0%,
        color-mix(in srgb, var(--background) 34%, transparent) 64%,
        transparent 100%
      );

      background: var(--panel);
    }

    .gallery-card::before {
      background: linear-gradient(
        100deg,
        var(--surface) 40%,
        color-mix(in srgb, var(--surface) 80%, var(--accent) 20%) 50%,
        var(--surface) 60%
      );
      background-size: 220% 100%;
    }

    .gallery-card::after {
      background: radial-gradient(
        circle at var(--card-x, 50%) var(--card-y, 50%),
        rgba(var(--accent-rgb), 0.20),
        transparent 34%
      );

    .gallery-card:hover {
      box-shadow: 0 28px 75px rgba(var(--shadow-rgb), 0.66);
    }

    }

      background: var(--surface);
    }

    .contact-modal {
      background: var(--modal-overlay);
    }

    .contact-card {
      background: var(--surface);
      border-color: var(--border);
      box-shadow: 0 35px 100px rgba(var(--shadow-rgb), 0.58);
    }

    .contact-card::before {
      background: radial-gradient(circle, rgba(var(--accent-rgb), 0.11), transparent 58%);
    }

    .contact-close {
      border-color: var(--border);
      background: rgba(var(--accent-rgb), 0.045);
    }

    .contact-close:hover,
    .contact-close:focus-visible {
      background: rgba(var(--accent-rgb), 0.12);
    }

    .contact-link::after {
      color: var(--accent);
    }

    .cursor {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(var(--accent-rgb), 0.08);
    }

    .cursor::before {
      background: var(--accent);
    }

    .cursor.is-hovering {
      border-color: var(--accent);
      background: var(--accent);
    }

    /* Theme picker */
    .theme-control {
      --theme-control-gap: 10px;
      position: fixed;
      top: max(24px, env(safe-area-inset-top));
      right: max(24px, env(safe-area-inset-right));
      z-index: 320;
      display: grid;
      justify-items: end;
      gap: var(--theme-control-gap);
      view-transition-name: theme-control;
    }

    .theme-toggle {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--foreground);
      background: var(--glass);
      box-shadow: 0 12px 36px rgba(var(--shadow-rgb), 0.24);
      backdrop-filter: blur(18px) saturate(1.18);
      -webkit-backdrop-filter: blur(18px) saturate(1.18);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.055em;
      text-transform: uppercase;
      transition:
        transform 320ms var(--ease-spring),
        border-color 300ms var(--ease),
        background-color 300ms var(--ease);
    }

    .theme-toggle:hover,
    .theme-toggle[aria-expanded="true"] {
      transform: translateY(-2px);
      border-color: rgba(var(--accent-rgb), 0.48);
      background: var(--glass-strong);
    }

    .theme-toggle:active {
      transform: translateY(0) scale(0.97);
    }

    .theme-toggle-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(var(--accent-rgb), 0.12);
      transition: background-color 400ms var(--ease), box-shadow 400ms var(--ease);
    }

    .theme-toggle-name {
      color: var(--muted);
      transition: color 300ms var(--ease);
    }

    .theme-toggle:hover .theme-toggle-name,
    .theme-toggle[aria-expanded="true"] .theme-toggle-name {
      color: var(--foreground);
    }

    .theme-menu {
      width: min(224px, calc(100vw - 48px));
      display: grid;
      gap: 4px;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--glass-strong);
      box-shadow: 0 24px 75px rgba(var(--shadow-rgb), 0.36);
      backdrop-filter: blur(24px) saturate(1.2);
      -webkit-backdrop-filter: blur(24px) saturate(1.2);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: translateY(-8px) scale(0.96);
      transform-origin: top right;
      transition:
        opacity 240ms var(--ease),
        transform 380ms var(--ease-spring),
        visibility 380ms;
    }

    .theme-control.is-open .theme-menu {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transform: translateY(0) scale(1);
    }

    .theme-option {
      --swatch: #ffffff;
      width: 100%;
      min-height: 42px;
      display: grid;
      grid-template-columns: 18px 1fr auto;
      align-items: center;
      gap: 11px;
      padding: 0 11px;
      border-radius: 11px;
      color: var(--muted);
      text-align: left;
      font-size: 13px;
      letter-spacing: -0.02em;
      transition:
        color 250ms var(--ease),
        background-color 250ms var(--ease),
        transform 300ms var(--ease-spring);
    }

    .theme-option:hover,
    .theme-option:focus-visible {
      color: var(--foreground);
      background: rgba(var(--accent-rgb), 0.09);
      transform: translateX(3px);
      outline-offset: -2px;
    }

    .theme-option[aria-checked="true"] {
      color: var(--foreground);
      background: rgba(var(--accent-rgb), 0.12);
    }

    .theme-option-swatch {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--swatch);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.22),
        0 0 0 4px color-mix(in srgb, var(--swatch) 15%, transparent);
    }

    .theme-option-check {
      width: 15px;
      height: 15px;
      display: grid;
      place-items: center;
      color: var(--accent);
      font-size: 12px;
      opacity: 0;
      transform: scale(0.5) rotate(-20deg);
      transition: opacity 220ms var(--ease), transform 320ms var(--ease-spring);
    }

    .theme-option[aria-checked="true"] .theme-option-check {
      opacity: 1;
      transform: scale(1) rotate(0deg);
    }

    /* Minimal first-load screen */
    .site-loader {
      position: fixed;
      inset: 0;
      z-index: 12000;
      display: grid;
      place-items: center;
      overflow: hidden;
      color: var(--foreground);
      background: var(--background);
      opacity: 1;
      visibility: visible;
      transition:
        opacity 650ms var(--ease-cinematic),
        visibility 650ms;
    }

    .site-loader::before {
      content: "";
      position: absolute;
      width: min(64vw, 720px);
      aspect-ratio: 1;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(var(--accent-rgb), 0.10), transparent 65%);
      transform: scale(0.76);
      animation: loader-breathe 1700ms var(--ease-in-out, ease-in-out) infinite alternate;
    }

    .site-loader.is-leaving {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .site-loader-inner {
      position: relative;
      z-index: 1;
      width: min(260px, calc(100vw - 64px));
      display: grid;
      justify-items: center;
      gap: 22px;
    }

    .site-loader-mark {
      overflow: hidden;
      font-size: clamp(46px, 7vw, 82px);
      font-weight: 400;
      line-height: 0.85;
      letter-spacing: -0.09em;
    }

    .site-loader-mark span {
      display: block;

    const siteLoader =
      document.getElementById("siteLoader");

    const loaderPercent =
      document.getElementById("loaderPercent");

    const themeControl =
      document.getElementById("themeControl");

    const themeToggle =
      document.getElementById("themeToggle");

    const themeMenu =
      document.getElementById("themeMenu");

    const themeCurrentName =
      document.getElementById("themeCurrentName");

    const themeOptions = Array.from(
      document.querySelectorAll(".theme-option")
    );

    const THEME_LABELS = {
      dark: "Dark",
      light: "Light",
      blue: "Blue",
      red: "Red",
      purple: "Purple",
      pink: "Pink",
      forest: "Forest"
    };

    function getActiveTheme() {
      const theme =
        document.documentElement.dataset.theme;

      return THEME_LABELS[theme]
        ? theme
        : "dark";
    }

    function updateThemeInterface(theme) {
      const safeTheme = THEME_LABELS[theme]
        ? theme
        : "dark";

      themeCurrentName.textContent =
        THEME_LABELS[safeTheme];

      themeOptions.forEach((option) => {
        option.setAttribute(
          "aria-checked",
          String(
            option.dataset.theme === safeTheme
          )
        );
      });

      requestAnimationFrame(() => {
        const background = getComputedStyle(
          document.documentElement
        ).getPropertyValue("--background").trim();

        const themeColorMeta =
          document.querySelector(
            'meta[name="theme-color"]'
          );

        if (themeColorMeta && background) {
          themeColorMeta.content = background;
        }
      });
    }

    function closeThemeMenu({
      returnFocus = false
    } = {}) {
      themeControl.classList.remove("is-open");
      themeToggle.setAttribute(
        "aria-expanded",
        "false"
      );
      themeMenu.setAttribute(
        "aria-hidden",
        "true"
      );

      if (returnFocus) themeToggle.focus();
    }

    function openThemeMenu() {
      themeControl.classList.add("is-open");
      themeToggle.setAttribute(
        "aria-expanded",
        "true"
      );
      themeMenu.setAttribute(
        "aria-hidden",
        "false"
      );
    }

    function applyTheme(theme, {
      animate = true
    } = {}) {
      if (!THEME_LABELS[theme]) return;

      const commitTheme = () => {
        document.documentElement.dataset.theme =
          theme;

        try {
          localStorage.setItem(
            "portfolio-theme",
            theme
          );
        } catch (error) {
          /* Theme still works when storage is unavailable. */
        }

        updateThemeInterface(theme);
      };

      if (
        animate &&
        !window.matchMedia(
          "(prefers-reduced-motion: reduce)"
        ).matches &&
        document.startViewTransition
      ) {
        document.documentElement.dataset
          .transitionKind = "theme";

        const transition =
          document.startViewTransition(
            commitTheme
          );

        transition.finished.finally(() => {
          delete document.documentElement.dataset
            .transitionKind;
        });
      } else {
        commitTheme();
      }
    }

    themeToggle.addEventListener(
      "click",
      () => {
        if (
          themeControl.classList.contains(
            "is-open"
          )
        ) {
          closeThemeMenu();
        } else {
          openThemeMenu();
        }
      }
    );

    themeOptions.forEach((option) => {
      option.addEventListener("click", () => {
        const selectedTheme =
          option.dataset.theme;

        if (selectedTheme !== getActiveTheme()) {
          applyTheme(selectedTheme);
        }

        closeThemeMenu({
          returnFocus: true
        });
      });
    });

    document.addEventListener(
      "pointerdown",
      (event) => {
        if (
          themeControl.classList.contains(
            "is-open"
          ) &&
          !themeControl.contains(event.target)
        ) {
          closeThemeMenu();
        }
      }
    );

    document.addEventListener(
      "keydown",
      (event) => {
        if (
          event.key === "Escape" &&
          themeControl.classList.contains(
            "is-open"
          )
        ) {
          event.stopPropagation();
          closeThemeMenu({
            returnFocus: true
          });
        }
      }
    );

    updateThemeInterface(getActiveTheme());

    /* The loader has a minimum display time so it feels intentional,
       but a fallback prevents slow external media from trapping it. */
    const loaderStartedAt = performance.now();
    let loaderReleased = false;
    let loaderFrame = null;

    function animateLoaderCounter() {
      if (loaderReleased) return;

      const elapsed =
        performance.now() - loaderStartedAt;

      const simulated = Math.min(
        94,
        Math.round(
          100 * (1 - Math.exp(-elapsed / 720))
        )
      );

      loaderPercent.textContent = String(
        simulated
      ).padStart(2, "0");

      loaderFrame = requestAnimationFrame(
        animateLoaderCounter
      );
    }

    function releaseSiteLoader() {
      if (loaderReleased) return;
      loaderReleased = true;

      if (loaderFrame) {
        cancelAnimationFrame(loaderFrame);
      }

      const elapsed =
        performance.now() - loaderStartedAt;

      const remaining = Math.max(
        0,
        1050 - elapsed
      );

      window.setTimeout(() => {
        loaderPercent.textContent = "100";
        document.body.classList.remove(
          "is-loading"
        );
        siteLoader.classList.add(
          "is-leaving"
        );

        window.setTimeout(() => {
          siteLoader.hidden = true;
        }, 720);
      }, remaining);
    }

    animateLoaderCounter();

    if (document.readyState === "complete") {
      releaseSiteLoader();
    } else {
      window.addEventListener(
        "load",
        releaseSiteLoader,
        { once: true }
      );
    }
