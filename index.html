      );

    const categoryInfoYear =
      document.getElementById(
        "categoryInfoYear"
      );

    const categoryInfoDescription =
      document.getElementById(
        "categoryInfoDescription"
      );

    const viewer =
      document.getElementById("viewer");

    const viewerHeaderLabel =
      document.getElementById(
        "viewerHeaderLabel"
      );

    const viewerMediaArea =
      document.getElementById(
        "viewerMediaArea"
      );

    const viewerTitle =
      document.getElementById("viewerTitle");

    const viewerItemType =
      document.getElementById(
        "viewerItemType"
      );

    const viewerClose =
      document.getElementById("viewerClose");

    const contactModal =
      document.getElementById("contactModal");

    const contactClose =
      document.getElementById("contactClose");

    const emailLink =
      document.getElementById("emailLink");

    const instagramLink =
      document.getElementById(
        "instagramLink"
      );

    const cursor =
      document.getElementById("cursor");

    let currentProject = null;
    let currentCategory = null;
    let previouslyFocusedElement = null;
    let gallerySeq = 0;
    let currentPageName = "home";

    const reducedMotionQuery =
      window.matchMedia(
        "(prefers-reduced-motion: reduce)"
      );

    const precisePointerQuery =
      window.matchMedia(
        "(hover: hover) and (pointer: fine)"
      );

    const routeDepth = {
      home: 0,
      projects: 1,
      detail: 2
    };

    function getCurrentRouteState(
      pageName = currentPageName
    ) {
      return {
        page: pageName,
        projectId:
          pageName === "detail"
            ? currentProject?.id || null
            : null,
        categoryId:
          pageName === "detail"
            ? currentCategory?.id || null
            : null
      };
    }

    function hashForRoute(route) {
      if (
        route.page === "detail" &&
        route.projectId
      ) {
        const project = encodeURIComponent(
          route.projectId
        );

        const category = route.categoryId
          ? `/${encodeURIComponent(
              route.categoryId
            )}`
          : "";

        return `#project/${project}${category}`;
      }

      return route.page === "projects"
        ? "#projects"
        : "#home";
    }

    function writeHistory(
      pageName,
      mode = "push",
      extraState = {}
    ) {
      const route = {
        ...getCurrentRouteState(pageName),
        ...extraState
      };

      const method =
        mode === "replace"
          ? "replaceState"
          : "pushState";

      history[method](
        route,
        "",
        hashForRoute(route)
      );
    }

    function activatePage(pageName) {
      Object.entries(pages).forEach(
        ([name, page]) => {
          const active = name === pageName;

          page.classList.toggle(
            "is-active",
            active
          );

          page.setAttribute(
            "aria-hidden",
            String(!active)
          );

          page.inert = !active;
        }
      );

      currentPageName = pageName;

      categoryPanel.classList.remove(
        "is-open"
      );

      mobileCategoryToggle.setAttribute(
        "aria-expanded",
        "false"
      );
    }

    function showPage(
      pageName,
      {
        historyMode = "push",
        animate = true
      } = {}
    ) {
      if (!pages[pageName]) {
        pageName = "home";
      }

      const previousPage = currentPageName;
      const direction =
        routeDepth[pageName] >=
        routeDepth[previousPage]
          ? "forward"
          : "back";

      document.documentElement.dataset
        .navDirection = direction;

      const update = () =>
        activatePage(pageName);

      const canUseViewTransition =
        animate &&
        previousPage !== pageName &&
        !reducedMotionQuery.matches &&
        typeof document.startViewTransition ===
          "function";

      if (canUseViewTransition) {
        document.documentElement.classList.add(
          "is-transitioning"
        );

        const transition =
          document.startViewTransition(update);

        transition.finished.finally(() => {
          document.documentElement.classList.remove(
            "is-transitioning"
          );
        });
      } else {
        update();
      }

      if (historyMode !== "none") {
        writeHistory(pageName, historyMode);
      }
    }

    openWorkButton.addEventListener(
      "click",
      () => showPage("projects")
    );

    document
      .querySelectorAll("[data-action]")
      .forEach((button) => {
        button.addEventListener(
          "click",
          () => {
            const destination =
              button.dataset.action;

            if (
              destination === "projects" ||
              destination === "home"
            ) {
              currentProject = null;
              currentCategory = null;
            }

            showPage(destination);
          }
        );
      });

    function renderProjectIndex() {
      projectIndex.replaceChildren();

      PORTFOLIO_DATA.forEach(
        (project, index) => {
          const button =
            document.createElement("button");

          button.type = "button";

          button.className =
            "project-link interactive fade-item";

          button.textContent =
            project.name;

          button.dataset.index =
            String(index + 1).padStart(
              2,
              "0"
            );

          button.style.transitionDelay =
            `${index * 35}ms`;

          button.addEventListener(
            "click",
            () => openProject(project.id)
          );

          projectIndex.appendChild(button);
        }
      );

      registerCursorTargets();
    }

    function openProject(
      projectId,
      {
        historyMode = "push",
        categoryId = null,
        animate = true
      } = {}
    ) {
      const project =
        PORTFOLIO_DATA.find(
          (item) => item.id === projectId
        );

      if (!project) {
        currentProject = null;
        currentCategory = null;

        showPage("projects", {
          historyMode,
          animate
        });

        return;
      }

      currentProject = project;

      renderCategories(project);

      if (project.categories.length) {
        const selectedCategory =
          project.categories.some(
            (category) =>
              category.id === categoryId
          )
            ? categoryId
            : project.categories[0].id;

        selectCategory(
          selectedCategory,
          { historyMode: "none" }
        );
      } else {
        currentCategory = null;

        galleryGrid.innerHTML = `
          <div class="gallery-empty">
            Belum ada kategori.
          </div>
        `;

        categoryInfo.classList.remove(
          "is-visible"
        );
      }

      showPage("detail", {
        historyMode,
        animate
      });
    }

    function renderCategories(project) {
      categoryList.replaceChildren();

      project.categories.forEach(
        (category, index) => {
          const button =
            document.createElement("button");

          button.type = "button";

          button.className =
            "category-button interactive";

          button.dataset.categoryId =
            category.id;

          button.style.setProperty(
            "--category-index",
            index
          );

          button.textContent =
            category.name;

          button.addEventListener(
            "click",
            () => {
              selectCategory(category.id);

              categoryPanel.classList.remove(
                "is-open"
              );

              mobileCategoryToggle.setAttribute(
                "aria-expanded",
                "false"
              );
            }
          );

          categoryList.appendChild(button);
        }
      );

      registerCursorTargets();
    }

    function selectCategory(
      categoryId,
      { historyMode = "replace" } = {}
    ) {
      if (!currentProject) {
        return;
      }

      const category =
        currentProject.categories.find(
          (item) =>
            item.id === categoryId
        );

      if (!category) {
        return;
      }

      currentCategory = category;

      mobileCategoryLabel.textContent =
        category.name;

      document
        .querySelectorAll(
          ".category-button"
        )
        .forEach((button) => {
          const active =
            button.dataset.categoryId ===
            categoryId;

          button.classList.toggle(
            "is-active",
            active
          );

          button.setAttribute(
            "aria-current",
            active ? "true" : "false"
          );
        });

      renderCategoryInfo(category);

      const mobileDetailScroller =
        window.matchMedia("(max-width: 820px)").matches
          ? pages.detail
          : galleryScroll;

      mobileDetailScroller.scrollTo({
        top: 0,
        left: 0,
        behavior: "auto"
      });

      renderGallery(category.items);

      if (
        currentPageName === "detail" &&
        historyMode !== "none"
      ) {
        writeHistory(
          "detail",
          historyMode
        );
      }
    }

    function renderCategoryInfo(category) {
      categoryInfo.classList.remove(
        "is-visible"
      );

      categoryInfoTitle.textContent =
        category.name ||
        "Untitled Project";

      categoryInfoRole.textContent =
        category.role || "—";

      categoryInfoSoftware.textContent =
        category.software || "—";

      categoryInfoYear.textContent =
        category.year || "—";

      categoryInfoDescription.textContent =
        category.description ||
        "Deskripsi belum ditambahkan.";

      placeCategoryInfo();

      requestAnimationFrame(() => {
        categoryInfo.classList.add(
          "is-visible"
        );
      });
    }

    function placeCategoryInfo() {
      const mobile =
        window.matchMedia(
          "(max-width: 820px)"
        ).matches;

      if (mobile) {
        mobileCategoryInfoMount.appendChild(
          categoryInfo
        );
      } else {
        categoryPanel.appendChild(
          categoryInfo
        );
      }
    }

    let categoryLayoutFrame = 0;

    window.addEventListener(
      "resize",
      () => {
        cancelAnimationFrame(
          categoryLayoutFrame
        );

        categoryLayoutFrame =
          requestAnimationFrame(
            placeCategoryInfo
          );
      },
      { passive: true }
    );

    function renderGallery(items) {
      galleryRevealObserver.disconnect();
      galleryGrid.replaceChildren();

      gallerySeq += 1;
      const renderId = gallerySeq;

      if (!items || !items.length) {
        galleryGrid.innerHTML = `
          <div class="gallery-empty">
            Belum ada karya.
          </div>
        `;

        return;
      }

      const EAGER_COUNT = 4;
      const CHUNK_SIZE = 8;
      let index = 0;

      function buildCard(item, i) {
        const eager = i < EAGER_COUNT;

        const card =
          document.createElement("article");

        card.className =
          "gallery-card interactive media-trigger";

        card.dataset.ratio =
          item.ratio || "square";

        card.style.transitionDelay =
          `${Math.min(
            (i % CHUNK_SIZE) * 45,
            360
          )}ms`;

        card.tabIndex = 0;

        card.setAttribute(
          "role",
          "button"
        );

        card.setAttribute(
          "aria-label",
          `Open ${item.title}`
        );

        const media =
          item.type === "youtube" ||
          item.type === "video"
            ? createVideoThumbnail(
                item,
                eager
              )
            : createImage(item, eager);

        markMediaLoaded(card, media);

        card.appendChild(media);

        if (
          item.type === "youtube" ||
          item.type === "video"
        ) {
          const playIcon =
            document.createElement("span");

          playIcon.className = "play-icon";

          playIcon.setAttribute(
            "aria-hidden",
            "true"
          );

          card.appendChild(playIcon);
        }

        const info =
          document.createElement("div");

        info.className =
          "gallery-card-info";

        const title =
          document.createElement("span");

        title.className =
          "gallery-card-title";

        title.textContent = item.title;

        const type =
          document.createElement("span");

        type.className =
          "gallery-card-type";

        type.textContent =
          item.type === "youtube"
            ? "video"
            : item.type;

        info.append(title, type);
        card.appendChild(info);

        let touchMoved = false;
        let touchStartX = 0;
        let touchStartY = 0;

        card.addEventListener(
          "pointerdown",
          (event) => {
            if (event.pointerType !== "touch") return;
            touchMoved = false;
            touchStartX = event.clientX;
            touchStartY = event.clientY;
          },
          { passive: true }
        );

        card.addEventListener(
          "pointermove",
          (event) => {
            if (event.pointerType !== "touch") return;

            const distance = Math.hypot(
              event.clientX - touchStartX,
              event.clientY - touchStartY
            );

            if (distance > 9) touchMoved = true;
          },
          { passive: true }
        );

        card.addEventListener(
          "click",
          (event) => {
            if (touchMoved) {
              event.preventDefault();
              touchMoved = false;
              return;
            }

            openViewer(item);
          }
        );

        card.addEventListener(
          "keydown",
          (event) => {
            if (
              event.key === "Enter" ||
              event.key === " "
            ) {
              event.preventDefault();
              openViewer(item);
            }
          }
        );

        return card;
      }

      function processChunk() {
        if (renderId !== gallerySeq) {
          return;
        }

        const fragment =
          document.createDocumentFragment();

        const end = Math.min(
          index + CHUNK_SIZE,
          items.length
        );

        for (; index < end; index += 1) {
          const card = buildCard(
            items[index],
            index
          );

          fragment.appendChild(card);

          galleryRevealObserver.observe(
            card
          );
        }

        galleryGrid.appendChild(fragment);

        registerCursorTargets();

        if (index < items.length) {
          requestAnimationFrame(
            processChunk
          );
        }
      }

      requestAnimationFrame(processChunk);
    }

    function markMediaLoaded(card, media) {
      if (
        media.complete &&
        media.naturalWidth > 0
      ) {
        card.classList.add("is-loaded");
        return;
      }

      media.addEventListener(
        "load",
        () => card.classList.add("is-loaded"),
        { once: true }
      );

      media.addEventListener(
        "error",
        () => card.classList.add("is-loaded"),
        { once: true }
      );
    }

    const galleryRevealObserver =
      new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              const card = entry.target;

              card.classList.add(
                "is-visible"
              );

              const pendingMedia =
                card.querySelector(
                  "img[data-src]"
                );

              if (pendingMedia) {
                pendingMedia.src =
                  pendingMedia.dataset.src;

                delete pendingMedia.dataset
                  .src;
              }

              galleryRevealObserver.unobserve(
                card
              );
            }
          });
        },
        {
          root: null,
          rootMargin: "300px 0px 300px 0px",
          threshold: 0.01
        }
      );

    function thumbnailUrl(src, width) {
      if (!src) {
        return src;
      }

      // Skip re-proxying things that are already
      // small/optimized or aren't plain remote images.
      if (
        src.startsWith("data:") ||
        src.includes("wsrv.nl") ||
        src.includes("images.unsplash.com")
      ) {
        return src;
      }

      return (
        `https://wsrv.nl/?url=${encodeURIComponent(
          src
        )}&w=${width}&q=76&output=webp`
      );
    }

    function createImage(item, eager) {
      const image =
        document.createElement("img");

      const thumbSrc = thumbnailUrl(
        item.src,
        820
      );

      image.alt = item.title;
      image.decoding = "async";

      if (eager) {
        image.src = thumbSrc;
        image.loading = "eager";
        image.fetchPriority = "high";
      } else {
        image.dataset.src = thumbSrc;
        image.loading = "lazy";
        image.fetchPriority = "low";
      }

      image.addEventListener(
        "error",
        () => {
          image.onerror = null;

          // If the resize proxy itself failed,
          // fall back to the original full image
          // before giving up entirely.
          if (
            image.src !== item.src &&
            !image.dataset.triedOriginal
          ) {
            image.dataset.triedOriginal =
              "true";

            image.src = item.src;
            return;
          }

          image.src =
            "https://images.unsplash.com/photo-1558655146-d09347e92766?auto=format&fit=crop&w=1200&q=80";
        }
      );

      return image;
    }

    function createVideoThumbnail(
      item,
      eager
    ) {
      const image =
        document.createElement("img");

      let poster = item.poster || "";

      if (
        !poster &&
        item.type === "youtube"
      ) {
        const videoId =
          extractYouTubeId(item.src);

        if (videoId) {
          poster =
            `https://i.ytimg.com/vi/${videoId}/maxresdefault.jpg`;
        }
      }

      const posterSrc = thumbnailUrl(
        poster ||
          "https://www.image2url.com/r2/default/images/1783993247149-9cacd6ad-c2cc-4316-8d51-f9159215b9c7.jpg",
        820
      );

      if (eager) {
        image.src = posterSrc;
        image.fetchPriority = "high";
      } else {
        image.dataset.src = posterSrc;
        image.fetchPriority = "low";
      }

      image.alt =
        `${item.title} video thumbnail`;

      image.loading = eager
        ? "eager"
        : "lazy";

      image.addEventListener(
        "error",
        () => {
          const videoId =
            extractYouTubeId(item.src);

          if (
            videoId &&
            !image.dataset.usedFallback
          ) {
            image.dataset.usedFallback =
              "true";

            image.src =
              `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`;

            return;
          }

          image.onerror = null;

          image.src =
            "https://images.unsplash.com/photo-1492619375914-88005aa9e8fb?auto=format&fit=crop&w=1200&q=80";
        }
      );

      return image;
    }

    function extractYouTubeId(input) {
      if (!input) {
        return null;
      }

      const raw =
        String(input).trim();

      if (
        /^[a-zA-Z0-9_-]{11}$/.test(raw)
      ) {
        return raw;
      }

      try {
        const url =
          new URL(
            raw,
            window.location.origin
          );

        const hostname =
          url.hostname
            .replace(/^www\./, "")
            .replace(/^m\./, "");

        if (hostname === "youtu.be") {
          return (
            url.pathname
              .split("/")
              .filter(Boolean)[0] ||
            null
          );
        }

        if (
          hostname === "youtube.com" ||
          hostname ===
            "youtube-nocookie.com"
        ) {
          if (url.pathname === "/watch") {
            return (
              url.searchParams.get("v") ||
              null
            );
          }

          const parts =
            url.pathname
              .split("/")
              .filter(Boolean);

          if (
            [
              "embed",
              "shorts",
              "live"
            ].includes(parts[0])
          ) {
            return parts[1] || null;
          }
        }
      } catch {}

      const match = raw.match(
        /(?:youtu\.be\/|youtube\.com\/(?:watch\?.*v=|embed\/|shorts\/|live\/))([a-zA-Z0-9_-]{11})/
      );

      return match ? match[1] : null;
    }

    function createYouTubeEmbedURL(input) {
      const videoId =
        extractYouTubeId(input);

      if (!videoId) {
        return null;
      }

      const params =
        new URLSearchParams({
          autoplay: "1",
          rel: "0",
          modestbranding: "1",
          playsinline: "1"
        });

      return (
        "https://www.youtube-nocookie.com/embed/" +
        encodeURIComponent(videoId) +
        "?" +
        params.toString()
      );
    }

    function openViewer(
      item,
      { historyMode = "push" } = {}
    ) {
      previouslyFocusedElement =
        document.activeElement;

      viewerHeaderLabel.textContent =
        currentProject
          ? currentProject.name
          : "Project preview";

      viewerTitle.textContent =
        item.title || "Untitled";

      viewerItemType.textContent = [
        currentCategory?.name,

        item.type === "youtube"
          ? "Video"
          : "Image"
      ]
        .filter(Boolean)
        .join(" / ");

      viewerMediaArea.replaceChildren();

      const shell =
        document.createElement("div");

      shell.className =
        "viewer-media-shell";

      shell.dataset.ratio =
        item.ratio || "landscape";

      if (item.type === "youtube") {
        const embedURL =
          createYouTubeEmbedURL(
            item.src
          );

        if (!embedURL) {
          renderViewerError(
            shell,
            "URL YouTube belum valid. Ganti VIDEO_ID dengan ID atau URL YouTube."
          );
        } else {
          const iframe =
            document.createElement(
              "iframe"
            );

          iframe.src = embedURL;
          iframe.title = item.title;

          iframe.allow =
            "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";

          iframe.allowFullscreen = true;

          iframe.referrerPolicy =
            "strict-origin-when-cross-origin";

          shell.appendChild(iframe);
        }
      } else if (
        item.type === "video"
      ) {
        const video =
          document.createElement("video");

        video.src = item.src;
        video.poster =
          item.poster || "";

        video.controls = true;
        video.autoplay = true;
        video.playsInline = true;

        video.addEventListener(
          "error",
          () => {
            shell.replaceChildren();

            renderViewerError(
              shell,
              "Video tidak dapat dimuat."
            );
          }
        );

        shell.appendChild(video);
      } else {
        const image =
          document.createElement("img");

        image.src = item.src;
        image.alt = item.title;

        image.addEventListener(
          "error",
          () => {
            shell.replaceChildren();

            renderViewerError(
              shell,
              "Gambar tidak dapat dimuat."
            );
          }
        );

        shell.appendChild(image);
      }

      viewerMediaArea.appendChild(shell);

      viewer.classList.add("is-open");

      viewer.setAttribute(
        "aria-hidden",
        "false"
      );

      viewerClose.focus();

      if (historyMode === "push") {
        const itemIndex =
          currentCategory?.items?.indexOf(
            item
          ) ?? -1;

        history.pushState(
          {
            ...getCurrentRouteState(),
            overlay: "viewer",
            itemIndex
          },
          "",
          window.location.href
        );
      }
    }

    function renderViewerError(
      container,
      message
    ) {
      const error =
        document.createElement("div");

      error.className = "viewer-error";
      error.textContent = message;

      container.appendChild(error);
    }

    function closeViewer(
      {
        historyMode = "back",
        restoreFocus = true
      } = {}
    ) {
      if (
        historyMode === "back" &&
        history.state?.overlay ===
          "viewer"
      ) {
        history.back();
        return;
      }

      const video =
        viewerMediaArea.querySelector(
          "video"
        );

      if (video) {
        video.pause();
        video.removeAttribute("src");
        video.load();
      }

      viewerMediaArea.replaceChildren();

      viewer.classList.remove("is-open");

      viewer.setAttribute(
        "aria-hidden",
        "true"
      );

      if (restoreFocus) {
        restorePreviousFocus();
      }
    }

    viewerClose.addEventListener(
      "click",
      closeViewer
    );

    viewer.addEventListener(
      "click",
      (event) => {
        if (event.target === viewer) {
          closeViewer();
        }
      }
    );

    function initializeContact() {
      emailLink.textContent =
        CONTACT_DATA.email;

      emailLink.href =
        `mailto:${CONTACT_DATA.email}`;

      instagramLink.textContent =
        CONTACT_DATA.instagramUsername;

      instagramLink.href =
        CONTACT_DATA.instagramURL;
    }

    function openContact(
      { historyMode = "push" } = {}
    ) {
      previouslyFocusedElement =
        document.activeElement;

      contactModal.classList.add(
        "is-open"
      );

      contactModal.setAttribute(
        "aria-hidden",
        "false"
      );

      contactClose.focus();

      if (historyMode === "push") {
        history.pushState(
          {
            ...getCurrentRouteState(),
            overlay: "contact"
          },
          "",
          window.location.href
        );
      }
    }

    function closeContact(
      {
        historyMode = "back",
        restoreFocus = true
      } = {}
    ) {
      contactModal.classList.remove(
        "is-open"
      );

      contactModal.setAttribute(
        "aria-hidden",
        "true"
      );

      if (
        historyMode === "back" &&
        history.state?.overlay ===
          "contact"
      ) {
        history.back();
        return;
      }

      if (restoreFocus) {
        restorePreviousFocus();
      }
    }

    openContactButton.addEventListener(
      "click",
      openContact
    );

    contactClose.addEventListener(
      "click",
      closeContact
    );

    contactModal.addEventListener(
      "click",
      (event) => {
        if (
          event.target === contactModal
        ) {
          closeContact();
        }
      }
    );

    function restorePreviousFocus() {
      if (
        previouslyFocusedElement &&
        document.contains(
          previouslyFocusedElement
        )
      ) {
        previouslyFocusedElement.focus();
      }
    }

    document.addEventListener(
      "keydown",
      (event) => {
        if (event.key !== "Escape") {
          return;
        }

        if (
          contactModal.classList.contains(
            "is-open"
          )
        ) {
          closeContact();
          return;
        }

        if (
          viewer.classList.contains(
            "is-open"
          )
        ) {
          closeViewer();
          return;
        }

        if (
          categoryPanel.classList.contains(
            "is-open"
          )
        ) {
          categoryPanel.classList.remove(
            "is-open"
          );

          mobileCategoryToggle.setAttribute(
            "aria-expanded",
            "false"
          );
        }
      }
    );

    mobileCategoryToggle.addEventListener(
      "click",
      () => {
        const willOpen =
          !categoryPanel.classList.contains(
            "is-open"
          );

        categoryPanel.classList.toggle(
          "is-open",
          willOpen
        );

        mobileCategoryToggle.setAttribute(
          "aria-expanded",
          String(willOpen)
        );
      }
    );

    document.addEventListener(
      "pointerdown",
      (event) => {
        if (
          !window.matchMedia("(max-width: 820px)").matches ||
          !categoryPanel.classList.contains("is-open") ||
          categoryPanel.contains(event.target)
        ) {
          return;
        }

        categoryPanel.classList.remove("is-open");
        mobileCategoryToggle.setAttribute(
          "aria-expanded",
          "false"
        );
      },
      { passive: true }
    );

    if (precisePointerQuery.matches) {
      openWorkButton.addEventListener(
        "pointermove",
        (event) => {
          const rect =
            openWorkButton.getBoundingClientRect();

          const normalizedX =
            (event.clientX - rect.left) /
              rect.width -
            0.5;

          const normalizedY =
            (event.clientY - rect.top) /
              rect.height -
            0.5;

          openWorkButton.style.setProperty(
            "--mag-x",
            `${normalizedX * 14}px`
          );

          openWorkButton.style.setProperty(
            "--mag-y",
            `${normalizedY * 14}px`
          );

          openWorkButton.style.setProperty(
            "--button-x",
            `${(normalizedX + 0.5) * 100}%`
          );

          openWorkButton.style.setProperty(
            "--button-y",
            `${(normalizedY + 0.5) * 100}%`
          );
        }
      );

      openWorkButton.addEventListener(
        "pointerleave",
        () => {
          openWorkButton.style.setProperty(
            "--mag-x",
            "0px"
          );

          openWorkButton.style.setProperty(
            "--mag-y",
            "0px"
          );
        }
      );

      galleryGrid.addEventListener(
        "pointermove",
        (event) => {
          const card = event.target.closest(
            ".gallery-card"
          );

          if (!card) {
            return;
          }

          const rect =
            card.getBoundingClientRect();

          const x =
            (event.clientX - rect.left) /
            rect.width;

          const y =
            (event.clientY - rect.top) /
            rect.height;

          card.style.setProperty(
            "--card-x",
            `${x * 100}%`
          );

          card.style.setProperty(
            "--card-y",
            `${y * 100}%`
          );

          card.style.setProperty(
            "--card-rotate-x",
            `${(0.5 - y) * 4}deg`
          );

          card.style.setProperty(
            "--card-rotate-y",
            `${(x - 0.5) * 4}deg`
          );
        },
        { passive: true }
      );

      galleryGrid.addEventListener(
        "pointerout",
        (event) => {
          const card = event.target.closest(
            ".gallery-card"
          );

          if (
            !card ||
            card.contains(event.relatedTarget)
          ) {
            return;
          }

          card.style.setProperty(
            "--card-rotate-x",
            "0deg"
          );

          card.style.setProperty(
            "--card-rotate-y",
            "0deg"
          );
        }
      );
    }

    let cursorX =
      window.innerWidth / 2;

    let cursorY =
      window.innerHeight / 2;

    let renderedCursorX = cursorX;
    let renderedCursorY = cursorY;

    window.addEventListener(
      "mousemove",
      (event) => {
        cursorX = event.clientX;
        cursorY = event.clientY;

        cursor.classList.add(
          "is-visible"
        );
      }
    );

    document.documentElement.addEventListener(
      "mouseleave",
      () => {
        cursor.classList.remove(
          "is-visible"
        );
      }
    );

    window.addEventListener("mousedown", () => {
      cursor.classList.add("is-clicking");
    });

    window.addEventListener("mouseup", () => {
      cursor.classList.remove("is-clicking");
    });

    const homePageEl =
      document.getElementById("homePage");

    if (homePageEl) {
      homePageEl.addEventListener(
        "mousemove",
        (event) => {
          const rect =
            homePageEl.getBoundingClientRect();

          const px =
            ((event.clientX - rect.left) /
              rect.width) *
            100;

          const py =
            ((event.clientY - rect.top) /
              rect.height) *
            100;

          homePageEl.style.setProperty(
            "--spot-x",
            `${px}%`
          );

          homePageEl.style.setProperty(
            "--spot-y",
            `${py}%`
          );
        }
      );
    }

    const portraitFrame =
      document.getElementById("portraitFrame");

    if (portraitFrame) {
      const portraitImg =
        portraitFrame.querySelector("img");

      let tiltTargetX = 0;
      let tiltTargetY = 0;
      let tiltRenderedX = 0;
      let tiltRenderedY = 0;

      portraitFrame.addEventListener(
        "mousemove",
        (event) => {
          const rect =
            portraitFrame.getBoundingClientRect();

          const px =
            (event.clientX - rect.left) /
              rect.width -
            0.5;

          const py =
            (event.clientY - rect.top) /
              rect.height -
            0.5;

          tiltTargetX = px * 14;
          tiltTargetY = py * -14;
        }
      );

      portraitFrame.addEventListener(
        "mouseleave",
        () => {
          tiltTargetX = 0;
          tiltTargetY = 0;
        }
      );

      function animateTilt() {
        tiltRenderedX +=
          (tiltTargetX - tiltRenderedX) * 0.12;

        tiltRenderedY +=
          (tiltTargetY - tiltRenderedY) * 0.12;

        if (portraitImg) {
          portraitImg.style.setProperty(
            "--tilt-x",
            `${tiltRenderedX}deg`
          );

          portraitImg.style.setProperty(
            "--tilt-y",
            `${tiltRenderedY}deg`
          );
        }

        requestAnimationFrame(animateTilt);
      }

      animateTilt();
    }

    function animateCursor() {
      renderedCursorX +=
        (cursorX - renderedCursorX) *
        0.18;

      renderedCursorY +=
        (cursorY - renderedCursorY) *
        0.18;

      cursor.style.transform =
        `translate3d(${renderedCursorX}px, ${renderedCursorY}px, 0)` +
        " translate(-50%, -50%)";

      requestAnimationFrame(
        animateCursor
      );
    }

    function registerCursorTargets() {
      document
        .querySelectorAll(".interactive")
        .forEach((element) => {
          if (
            element.dataset
              .cursorRegistered === "true"
          ) {
            return;
          }

          element.dataset.cursorRegistered =
            "true";

          element.addEventListener(
            "mouseenter",
            () => {
              cursor.classList.add(
                "is-hovering"
              );

              if (
                element.classList.contains(
                  "media-trigger"
                )
              ) {
                cursor.classList.add(
                  "is-viewing"
                );

                cursor.dataset.label =
                  "VIEW";
              }
            }
          );

          element.addEventListener(
            "mouseleave",
            () => {
              cursor.classList.remove(
                "is-hovering",
                "is-viewing"
              );

              cursor.dataset.label = "";
            }
          );
        });
    }

    function parseRouteFromLocation() {
      const hash =
        window.location.hash || "#home";

      if (hash.startsWith("#project/")) {
        const segments = hash
          .replace("#project/", "")
          .split("/")
          .filter(Boolean)
          .map((segment) => {
            try {
              return decodeURIComponent(
                segment
              );
            } catch {
              return segment;
            }
          });

        return {
          page: "detail",
          projectId: segments[0] || null,
          categoryId: segments[1] || null
        };
      }

      if (hash === "#projects") {
        return { page: "projects" };
      }

      return { page: "home" };
    }

    function restoreRoute(
      route,
      { animate = true } = {}
    ) {
      const safeRoute =
        route && pages[route.page]
          ? route
          : parseRouteFromLocation();

      closeViewer({
        historyMode: "none",
        restoreFocus: false
      });

      closeContact({
        historyMode: "none",
        restoreFocus: false
      });

      if (
        safeRoute.page === "detail" &&
        safeRoute.projectId
      ) {
        openProject(
          safeRoute.projectId,
          {
            historyMode: "none",
            categoryId:
              safeRoute.categoryId,
            animate
          }
        );
      } else {
        currentProject = null;
        currentCategory = null;

        showPage(
          safeRoute.page === "projects"
            ? "projects"
            : "home",
          {
            historyMode: "none",
            animate
          }
        );
      }

      if (
        safeRoute.overlay === "viewer" &&
        currentCategory &&
        Number.isInteger(
          safeRoute.itemIndex
        )
      ) {
        const item =
          currentCategory.items[
            safeRoute.itemIndex
          ];

        if (item) {
          openViewer(item, {
            historyMode: "none"
          });
        }
      } else if (
        safeRoute.overlay === "contact"
      ) {
        openContact({
          historyMode: "none"
        });
      }
    }

    function handleInitialRoute() {
      const initialRoute =
        parseRouteFromLocation();

      restoreRoute(initialRoute, {
        animate: false
      });

      writeHistory(
        currentPageName,
        "replace"
      );
    }

    window.addEventListener(
      "popstate",
      (event) => {
        restoreRoute(
          event.state ||
            parseRouteFromLocation()
        );
      }
    );

    initializeContact();
    renderProjectIndex();
    registerCursorTargets();
    animateCursor();
    handleInitialRoute();
  </script>
</body>
</html>
